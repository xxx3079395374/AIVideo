<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模型详情 · FORGE3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
<style>
:root{
  --void:#030812;--card:rgba(8,20,42,0.88);
  --neon:#00C8FF;--orange:#FF6B1A;--green:#3BFF5A;--gold:#FFB800;
  --bright:#E8F8FF;--mid:#6B9AB5;--dim:#2E4F68;
  --border:rgba(0,200,255,0.14);--r:18px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--void);color:var(--bright);font-family:'Noto Sans SC',sans-serif;overflow-x:hidden;min-height:100vh;}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.gbg{position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:linear-gradient(rgba(0,200,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.018) 1px,transparent 1px);
  background-size:64px 64px;}

nav.top{position:fixed;inset:0 0 auto 0;z-index:100;height:64px;padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(3,8,18,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo svg{width:32px;height:32px;}
.logo-name{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,var(--neon),#00FFE5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
nav.top ul{display:flex;gap:24px;list-style:none;}
nav.top ul a{color:var(--mid);text-decoration:none;font-size:12px;font-weight:700;letter-spacing:1.5px;font-family:'Orbitron',sans-serif;transition:color .2s;}
nav.top ul a:hover,nav.top ul a.active{color:var(--neon);}

.wrap{position:relative;z-index:10;padding-top:64px;}
.back-bar{padding:20px 40px;display:flex;align-items:center;gap:14px;max-width:1100px;margin:0 auto;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--mid);text-decoration:none;
  font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;
  padding:8px 14px;border-radius:8px;background:rgba(0,200,255,0.06);
  border:1px solid var(--border);transition:all .2s;}
.back-btn:hover{border-color:var(--neon);color:var(--neon);}
.back-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;}

.detail-main{display:grid;grid-template-columns:1.2fr 1fr;gap:24px;
  max-width:1100px;margin:0 auto;padding:0 40px 60px;}

/* ── 3D PREVIEW ── */
.preview{background:radial-gradient(ellipse at center,rgba(0,30,80,0.7),rgba(3,8,18,0.95)),var(--card);
  border:1px solid var(--border);border-radius:var(--r);
  min-height:480px;position:relative;overflow:hidden;}
#modelCanvas{width:100%;height:100%;display:block;min-height:480px;
  cursor:grab;touch-action:none;}
#modelCanvas:active{cursor:grabbing;}
.preview-tag{position:absolute;top:16px;left:16px;padding:5px 12px;
  background:rgba(0,200,255,.1);border:1px solid rgba(0,200,255,.25);border-radius:100px;
  font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;color:var(--neon);letter-spacing:1px;z-index:3;
  pointer-events:none;}
.preview-hint{position:absolute;bottom:60px;left:0;right:0;text-align:center;
  font-size:11px;color:rgba(0,200,255,.45);letter-spacing:.5px;pointer-events:none;
  font-family:'Orbitron',sans-serif;
  animation:fadeHint 3s ease 1s forwards;}
@keyframes fadeHint{0%{opacity:1;}100%{opacity:0;}}
.preview-tools{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:3;}
.ptool{display:flex;align-items:center;justify-content:center;padding:0 14px;height:36px;
  border-radius:100px;background:rgba(6,16,38,.85);border:1px solid var(--border);
  color:var(--mid);cursor:pointer;transition:all .2s;font-size:13px;font-weight:700;
  font-family:'Noto Sans SC',sans-serif;gap:5px;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;}
.ptool svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
.ptool:hover,.ptool.active{border-color:var(--neon);color:var(--neon);background:rgba(0,200,255,.1);}
.ptool.spinning{color:var(--orange);border-color:var(--orange);}

/* Info Panel */
.info{display:flex;flex-direction:column;gap:18px;}
.info-head{padding:24px 28px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);}
.model-cat{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;
  background:rgba(255,184,0,0.12);border:1px solid rgba(255,184,0,.25);border-radius:100px;
  font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;color:var(--gold);
  letter-spacing:1px;margin-bottom:12px;}
.model-name{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:var(--bright);margin-bottom:8px;}
.model-desc{font-size:14px;color:var(--mid);line-height:1.7;}

.info-stats{display:grid;grid-template-columns:1fr 1fr;gap:0;
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.istat{padding:18px 20px;display:flex;flex-direction:column;gap:6px;
  border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.istat:nth-child(2n){border-right:none;}
.istat:nth-last-child(-n+2){border-bottom:none;}
.istat-label{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;
  color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.istat-value{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:var(--bright);}
.diff-dots{display:flex;gap:3px;}
.diff-dot{width:9px;height:9px;border-radius:50%;background:var(--dim);}
.diff-dot.on{background:var(--neon);box-shadow:0 0 6px rgba(0,200,255,.5);}

.tabs-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:14px;background:transparent;border:none;cursor:pointer;
  font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;
  color:var(--dim);transition:all .2s;-webkit-tap-highlight-color:transparent;}
.tab.active{color:var(--neon);background:rgba(0,200,255,.05);box-shadow:inset 0 -2px 0 var(--neon);}
.tab-content{padding:20px 24px;font-size:14px;color:var(--mid);line-height:1.85;min-height:120px;}
.tab-content strong{color:var(--bright);font-weight:700;}
.tab-content ul{list-style:none;padding:0;}
.tab-content li{display:flex;align-items:flex-start;gap:10px;padding:6px 0;}
.tab-content li::before{content:'✦';color:var(--neon);flex-shrink:0;}

/* Action bar */
.actions{position:sticky;bottom:0;background:rgba(3,8,18,0.95);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);padding:16px 40px;display:flex;gap:12px;
  max-width:1100px;margin:0 auto;}
.btn-action{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  height:54px;border-radius:14px;font-family:'Orbitron',sans-serif;font-size:14px;
  font-weight:900;letter-spacing:1px;cursor:pointer;transition:all .2s;border:none;
  -webkit-tap-highlight-color:transparent;}
.btn-save{background:rgba(0,200,255,.08);border:1.5px solid var(--border);color:var(--neon);flex:0 0 auto;padding:0 26px;}
.btn-save:hover,.btn-save.saved{border-color:var(--neon);background:rgba(0,200,255,.14);}
.btn-edit{background:rgba(192,96,255,.08);border:1.5px solid rgba(192,96,255,.25);color:#C060FF;flex:0 0 auto;padding:0 26px;}
.btn-edit:hover{border-color:#C060FF;background:rgba(192,96,255,.14);}
.btn-print{background:linear-gradient(135deg,var(--orange),#FF3300);color:#fff;
  box-shadow:0 6px 24px rgba(255,107,26,.35);}
.btn-print:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(255,107,26,.5);}

/* ── BOTTOM NAV ── */
nav.bnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;height:68px;
  background:rgba(3,8,18,0.97);backdrop-filter:blur(24px);border-top:1px solid rgba(0,200,255,0.12);
  padding:0 8px;justify-content:space-around;align-items:center;}
.bn{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;
  color:var(--dim);padding:6px 12px;transition:color .2s;-webkit-tap-highlight-color:transparent;flex:1;}
.bn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.bn span{font-size:10px;font-weight:700;font-family:'Orbitron',sans-serif;letter-spacing:.5px;}
.bn.active{color:var(--neon);}
.bn.active svg{filter:drop-shadow(0 0 5px var(--neon));}
.bn-fab{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--orange),#FF3300);
  display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(255,107,26,0.45);
  margin-top:-18px;border:3px solid rgba(3,8,18,0.9);text-decoration:none;flex-shrink:0;
  transition:transform .15s;-webkit-tap-highlight-color:transparent;}
.bn-fab:active{transform:scale(0.92);}
.bn-fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

@media(max-width:1280px){
  nav.top ul{display:none;}nav.top{padding:0 16px;}
  nav.bnav{display:flex;}
  .back-bar{padding:14px 16px;}
  .detail-main{grid-template-columns:1fr;padding:0 16px 40px;gap:16px;}
  .preview{min-height:320px;}
  #modelCanvas{min-height:320px;}
  .actions{padding:14px 16px 14px;margin-bottom:68px;}
  .btn-save,.btn-edit{padding:0 16px;}
  .btn-action{font-size:12px;}
}
@media(max-width:480px){
  .ptool{padding:0 10px;font-size:12px;}
}
</style>
</head>

<script>
/* ── STARFIELD ── */
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const pts=Array.from({length:140},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.2+.3,a:Math.random(),s:Math.random()*.003+.001}));
  (function draw(){ctx.clearRect(0,0,c.width,c.height);
    pts.forEach(s=>{s.a+=s.s;if(s.a>1){s.a=0;s.x=Math.random();s.y=Math.random();}
      ctx.globalAlpha=s.a*.65;ctx.fillStyle='#E8F8FF';
      ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;requestAnimationFrame(draw);})();
})();

/* ── MODEL DATA ── */

    cat:'🏛️ 建筑 · 世界地标', time:'约 6 小时', size:'8 × 8 × 25 cm', diff:3, diffLabel:'较难',
    tabs:[
      `<p><strong>埃菲尔铁塔</strong>是法国巴黎的标志性建筑，1889 年建成，高 330 米。这款模型精确还原了铁塔的镂空结构，是建筑爱好者的梦想收藏！</p>`,
      `<ul><li>埃菲尔铁塔由 <strong>18,038</strong> 块金属部件组成</li><li>夏天会因热胀冷缩<strong>增高约 15 厘米</strong></li><li>每隔 7 年就需要重新涂漆，需要 60 吨油漆</li></ul>`,
      `<ul><li>建议层高 <strong>0.15mm</strong> 以保留细节</li><li>填充率 <strong>15%</strong>，减轻重量</li><li>推荐金色 <strong>PLA</strong> 材料，复原原版颜色</li><li>喷头 <strong>200°C</strong> / 热床 <strong>60°C</strong></li></ul>`
    ],
    desc:'精细还原的埃菲尔铁塔模型，镂空格架结构，是 3D 打印技术的完美展示！'
  }
};

/* ── THREE.JS SETUP ── */
const canvas3d = document.getElementById('modelCanvas');
const renderer = new THREE.WebGLRenderer({canvas: canvas3d, antialias: true, alpha: true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);

// Lights
const ambientLight = new THREE.AmbientLight(0x001830, 0.8);
scene.add(ambientLight);
const keyLight = new THREE.DirectionalLight(0x00C8FF, 1.4);
keyLight.position.set(5, 8, 6);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xFF6B1A, 0.5);
fillLight.position.set(-6, -2, -4);
scene.add(fillLight);
const topLight = new THREE.DirectionalLight(0xffffff, 0.3);
topLight.position.set(0, 10, 0);
scene.add(topLight);

// Grid floor
const gridHelper = new THREE.GridHelper(10, 20, 0x003355, 0x001122);
gridHelper.position.y = -2.5;
scene.add(gridHelper);

// State
let modelGroup = null;
let wireGroup = null;
let spherical = {theta: 0.4, phi: 1.1};
let zoom = 6;
let isWire = false;
let isSpinning = false;
let isDragging = false;
let prevMouse = {x: 0, y: 0};
let prevPinchDist = 0;
let lastTimestamp = 0;

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function updateCamera() {
  camera.position.set(
    zoom * Math.sin(spherical.phi) * Math.cos(spherical.theta),
    zoom * Math.cos(spherical.phi),
    zoom * Math.sin(spherical.phi) * Math.sin(spherical.theta)
  );
  camera.lookAt(0, 0, 0);
}
updateCamera();

function resizeRenderer() {
  const w = canvas3d.clientWidth, h = canvas3d.clientHeight || 480;
  if (canvas3d.width !== w || canvas3d.height !== h) {
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
}

/* ── MESH HELPER ── */
function mesh(geo, color, opts = {}) {
  const mat = new THREE.MeshPhongMaterial({
    color, shininess: 60,
    emissive: opts.emissive || 0x000000,
    emissiveIntensity: opts.emissiveInt || 0,
    transparent: opts.transparent || false,
    opacity: opts.opacity || 1,
  });
  const m = new THREE.Mesh(geo, mat);
  if (opts.pos) m.position.set(...opts.pos);
  if (opts.rot) m.rotation.set(...opts.rot);
  if (opts.scale) m.scale.set(...opts.scale);
  return m;
}

/* ── MODEL BUILDERS ── */
function buildDino() {
  const g = new THREE.Group();
  const col = 0xEE8833, dark = 0xCC6622, eye = 0x111111;
  // body
  g.add(mesh(new THREE.BoxGeometry(2, 1, 1.2), col));
  // head
  g.add(mesh(new THREE.BoxGeometry(1.1, 0.85, 1.05), col, {pos:[1.25, 0.55, 0]}));
  // lower jaw
  g.add(mesh(new THREE.BoxGeometry(0.9, 0.22, 0.85), dark, {pos:[1.35, 0.1, 0]}));
  // tail
  const tail = mesh(new THREE.BoxGeometry(1.6, 0.35, 0.55), col, {pos:[-1.55, -0.15, 0]});
  tail.rotation.z = 0.22;
  g.add(tail);
  // upper arms (tiny)
  g.add(mesh(new THREE.BoxGeometry(0.22, 0.45, 0.2), col, {pos:[0.8, 0.12, 0.55]}));
  g.add(mesh(new THREE.BoxGeometry(0.22, 0.45, 0.2), col, {pos:[0.8, 0.12, -0.55]}));
  // legs
  g.add(mesh(new THREE.CylinderGeometry(0.2, 0.17, 1.2, 8), col, {pos:[0.4, -1.1, 0.42]}));
  g.add(mesh(new THREE.CylinderGeometry(0.2, 0.17, 1.2, 8), col, {pos:[0.4, -1.1, -0.42]}));
  // feet
  g.add(mesh(new THREE.BoxGeometry(0.4, 0.18, 0.5), dark, {pos:[0.4, -1.74, 0.55]}));
  g.add(mesh(new THREE.BoxGeometry(0.4, 0.18, 0.5), dark, {pos:[0.4, -1.74, -0.55]}));
  // eyes
  g.add(mesh(new THREE.SphereGeometry(0.1, 8, 8), eye, {pos:[1.72, 0.75, 0.37]}));
  g.add(mesh(new THREE.SphereGeometry(0.1, 8, 8), eye, {pos:[1.72, 0.75, -0.37]}));
  g.position.y = 0.5;
  return g;
}

function buildRocket() {
  const g = new THREE.Group();
  const white = 0xDDEEFF, red = 0xFF3344, neon = 0x00C8FF, gold = 0xFFCC44;
  // body
  g.add(mesh(new THREE.CylinderGeometry(0.5, 0.5, 3.5, 16), white));
  // nose cone
  g.add(mesh(new THREE.ConeGeometry(0.5, 1.4, 16), red, {pos:[0, 2.45, 0]}));
  // neon stripe
  g.add(mesh(new THREE.CylinderGeometry(0.52, 0.52, 0.25, 16), neon, {pos:[0, 0.8, 0]}, {emissive:0x00C8FF, emissiveInt:0.4}));
  // window
  g.add(mesh(new THREE.SphereGeometry(0.22, 10, 10), 0x88DDFF, {pos:[0.5, 0.5, 0]}, {emissive:0x00C8FF, emissiveInt:0.2}));
  // fins (3)
  for (let i = 0; i < 3; i++) {
    const angle = i * Math.PI * 2 / 3;
    const fin = mesh(new THREE.BoxGeometry(0.08, 1.1, 0.7), red);
    fin.position.set(Math.cos(angle) * 0.52, -1.5, Math.sin(angle) * 0.52);
    fin.rotation.y = -angle;
    g.add(fin);
  }
  // exhaust bell
  g.add(mesh(new THREE.CylinderGeometry(0.42, 0.32, 0.6, 16), gold, {pos:[0, -2.05, 0]}));
  // exhaust glow disc
  g.add(mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.05, 16), 0xFF6600, {pos:[0, -2.38, 0]}, {emissive:0xFF6600, emissiveInt:1}));
  g.position.y = 0.2;
  return g;
}

function buildRobot() {
  const g = new THREE.Group();
  const metal = 0x6688AA, dark = 0x1A2B3C, neonC = 0x00C8FF, orange = 0xFF6B1A;
  // head box
  g.add(mesh(new THREE.BoxGeometry(2.2, 2, 1.9), metal));
  // brow ridge
  g.add(mesh(new THREE.BoxGeometry(2.2, 0.2, 0.2), dark, {pos:[0, 0.8, 0.96]}));
  // visor (glowing)
  const visor = mesh(new THREE.BoxGeometry(1.7, 0.5, 0.14), neonC, {pos:[0, 0.35, 0.98]});
  visor.material.emissive = new THREE.Color(0x00C8FF);
  visor.material.emissiveIntensity = 0.7;
  g.add(visor);
  // visor inner glow layer
  g.add(mesh(new THREE.BoxGeometry(1.5, 0.32, 0.1), 0x003355, {pos:[0, 0.35, 1.05]}));
  // side ears
  [-1.15, 1.15].forEach(x => {
    g.add(mesh(new THREE.BoxGeometry(0.2, 0.7, 0.6), dark, {pos:[x, 0.2, 0]}));
    g.add(mesh(new THREE.SphereGeometry(0.12, 8, 8), orange, {pos:[x * 1.18, 0.5, 0]}, {emissive:0xFF6B1A, emissiveInt:0.4}));
  });
  // mouth grille
  for (let i = -1; i <= 1; i++) {
    g.add(mesh(new THREE.BoxGeometry(0.25, 0.1, 0.12), dark, {pos:[i * 0.55, -0.55, 0.96]}));
  }
  // chin
  g.add(mesh(new THREE.BoxGeometry(1.8, 0.3, 1.6), 0x3A5066, {pos:[0, -0.85, 0]}));
  // antenna
  g.add(mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.9, 6), dark, {pos:[0, 1.45, 0]}));
  const antBall = mesh(new THREE.SphereGeometry(0.14, 8, 8), orange, {pos:[0, 1.96, 0]});
  antBall.material.emissive = new THREE.Color(0xFF6B1A);
  antBall.material.emissiveIntensity = 0.6;
  g.add(antBall);
  g.position.y = 0.2;
  return g;
}

function buildTower() {
  const g = new THREE.Group();
  const gold = 0xBB8822, darkG = 0x8A6010;
  // base legs (4 pillars that splay outward)
  const legAngles = [Math.PI/4, 3*Math.PI/4, 5*Math.PI/4, 7*Math.PI/4];
  legAngles.forEach(a => {
    const leg = mesh(new THREE.BoxGeometry(0.18, 2.2, 0.18), gold);
    leg.position.set(Math.cos(a) * 1.5, -1.5, Math.sin(a) * 1.5);
    leg.rotation.z = -Math.cos(a) * 0.5;
    leg.rotation.x = Math.sin(a) * 0.5;
    g.add(leg);
  });
  // horizontal ring 1 (base)
  g.add(mesh(new THREE.TorusGeometry(1.55, 0.07, 6, 20), gold, {pos:[0, -0.4, 0], rot:[Math.PI/2,0,0]}));
  // horizontal ring 2 (mid)
  g.add(mesh(new THREE.TorusGeometry(0.95, 0.06, 6, 20), gold, {pos:[0, 0.7, 0], rot:[Math.PI/2,0,0]}));
  // mid section body
  g.add(mesh(new THREE.CylinderGeometry(0.9, 1.4, 1.4, 16, 1, true), gold, {pos:[0, 0, 0]}));
  // upper section
  g.add(mesh(new THREE.CylinderGeometry(0.35, 0.88, 1.5, 12, 1, true), gold, {pos:[0, 1.45, 0]}));
  // viewing platform ring
  g.add(mesh(new THREE.TorusGeometry(0.42, 0.06, 6, 20), darkG, {pos:[0, 2.2, 0], rot:[Math.PI/2,0,0]}));
  // upper spire base
  g.add(mesh(new THREE.CylinderGeometry(0.25, 0.35, 0.8, 10), gold, {pos:[0, 2.6, 0]}));
  // spire
  g.add(mesh(new THREE.CylinderGeometry(0.03, 0.2, 1.6, 8), darkG, {pos:[0, 3.6, 0]}));
  // spire tip ball
  g.add(mesh(new THREE.SphereGeometry(0.08, 8, 8), gold, {pos:[0, 4.4, 0]}));
  g.position.y = 0.8;
  return g;
}

/* ── WIREFRAME BUILDER ── */
function buildWireGroup(source) {
  const g = new THREE.Group();
  source.traverse(child => {
    if (child.isMesh) {
      const edges = new THREE.EdgesGeometry(child.geometry, 15);
      const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color: 0x00C8FF, transparent: true, opacity: 0.7}));
      line.position.copy(child.position);
      line.rotation.copy(child.rotation);
      line.scale.copy(child.scale);
      g.add(line);
    }
  });
  g.position.copy(source.position);
  g.rotation.copy(source.rotation);
  return g;
}

/* ── LOAD MODEL ── */
function loadModel(name) {
  // Remove existing
  if (modelGroup) scene.remove(modelGroup);
  if (wireGroup) scene.remove(wireGroup);

  if (name.includes('霸王龙') || name.includes('恐龙')) modelGroup = buildDino();
  else if (name.includes('火箭')) modelGroup = buildRocket();
  else if (name.includes('机器人')) modelGroup = buildRobot();
  else if (name.includes('埃菲尔') || name.includes('铁塔')) modelGroup = buildTower();
  else modelGroup = buildDino(); // default

  scene.add(modelGroup);
  wireGroup = buildWireGroup(modelGroup);
  // wireGroup not added yet – only on toggle
}

/* ── WIREFRAME TOGGLE ── */
function toggleWire(btn) {
  isWire = !isWire;
  btn.classList.toggle('active', !isWire);
  document.getElementById('previewTag').textContent = isWire ? '⬡ 线框模式' : '⬡ 实体模式';
  if (isWire) {
    modelGroup.visible = false;
    if (!wireGroup.parent) scene.add(wireGroup);
    wireGroup.visible = true;
  } else {
    modelGroup.visible = true;
    if (wireGroup.parent) wireGroup.visible = false;
  }
}

/* ── AUTO SPIN ── */
function toggleSpin(btn) {
  isSpinning = !isSpinning;
  btn.classList.toggle('spinning', isSpinning);
}

/* ── RESET VIEW ── */
function resetView() {
  spherical.theta = 0.4;
  spherical.phi = 1.1;
  zoom = 6;
  updateCamera();
}

/* ── DRAG CONTROLS ── */
canvas3d.addEventListener('mousedown', e => {
  isDragging = true;
  prevMouse = {x: e.clientX, y: e.clientY};
  isSpinning = false;
  document.getElementById('btnSpin').classList.remove('spinning');
}, {passive: true});
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  spherical.theta -= dx * 0.012;
  spherical.phi = clamp(spherical.phi + dy * 0.012, 0.15, Math.PI - 0.15);
  prevMouse = {x: e.clientX, y: e.clientY};
  updateCamera();
});
canvas3d.addEventListener('wheel', e => {
  e.preventDefault();
  zoom = clamp(zoom + e.deltaY * 0.012, 2.5, 14);
  updateCamera();
}, {passive: false});

/* Touch */
canvas3d.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    prevMouse = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    isSpinning = false;
  } else if (e.touches.length === 2) {
    isDragging = false;
    prevPinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, {passive: true});
canvas3d.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - prevMouse.x;
    const dy = e.touches[0].clientY - prevMouse.y;
    spherical.theta -= dx * 0.012;
    spherical.phi = clamp(spherical.phi + dy * 0.012, 0.15, Math.PI - 0.15);
    prevMouse = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    updateCamera();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if (prevPinchDist > 0) {
      zoom = clamp(zoom * (prevPinchDist / dist), 2.5, 14);
      updateCamera();
    }
    prevPinchDist = dist;
  }
}, {passive: true});
canvas3d.addEventListener('touchend', () => { isDragging = false; prevPinchDist = 0; }, {passive: true});

/* ── RENDER LOOP ── */
function animate(ts) {
  requestAnimationFrame(animate);
  resizeRenderer();
  if (isSpinning) {
    spherical.theta += 0.008;
    updateCamera();
  }
  // subtle model bob
  if (modelGroup) {
    modelGroup.position.y = modelGroup.position.y + Math.sin(ts * 0.001) * 0.0008;
    if (wireGroup) wireGroup.position.y = modelGroup.position.y;
  }
  renderer.render(scene, camera);
}
animate(0);

/* ── TABS ── */
let tabsData = [];
function setTab(el, i) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tabContent').innerHTML = tabsData[i] || '';
}

/* ── POPULATE UI FROM URL PARAM ── */
const params = new URLSearchParams(location.search);
const modelName = params.get('name') || '霸王龙';

const data = MODEL_DATA[modelName] || MODEL_DATA['霸王龙'];

document.getElementById('modelDesc').textContent = data.desc;

/* ── SAVE ── */
function toggleSave(btn) {
  const saved = btn.classList.toggle('saved');
  btn.innerHTML = saved ? '<span>✓</span><span>已收藏</span>' : '<span>💾</span><span>收藏</span>';
}
</script>
