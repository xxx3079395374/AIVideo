<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI创作 · FORGE3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#030812;--card:rgba(8,20,42,0.88);
  --neon:#00C8FF;--orange:#FF6B1A;--green:#3BFF5A;
  --bright:#E8F8FF;--mid:#6B9AB5;--dim:#2E4F68;
  --border:rgba(0,200,255,0.14);--r:18px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--void);color:var(--bright);font-family:'Noto Sans SC',sans-serif;overflow-x:hidden;min-height:100vh;}

#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.gbg{position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:linear-gradient(rgba(0,200,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.018) 1px,transparent 1px);
  background-size:64px 64px;}
.scanline{position:fixed;left:0;right:0;top:-4px;height:4px;z-index:2;pointer-events:none;
  background:linear-gradient(transparent,rgba(0,200,255,0.05),transparent);animation:scan 8s linear infinite;}
@keyframes scan{to{top:100vh;}}

nav.top{position:fixed;inset:0 0 auto 0;z-index:100;height:64px;padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(3,8,18,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo svg{width:34px;height:34px;}
.logo-name{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,var(--neon),#00FFE5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
nav.top ul{display:flex;gap:28px;list-style:none;}
nav.top ul a{color:var(--mid);text-decoration:none;font-size:12px;font-weight:700;letter-spacing:1.5px;
  font-family:'Orbitron',sans-serif;transition:color .2s;}
nav.top ul a:hover,nav.top ul a.active{color:var(--neon);}

/* ── PAGE LAYOUT ── */
.wrap{position:relative;z-index:10;padding-top:64px;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding-bottom:100px;}

.page-head{text-align:center;padding:52px 24px 36px;max-width:640px;}
.page-head h1{font-family:'Orbitron',sans-serif;font-size:clamp(26px,4vw,42px);font-weight:900;
  margin-bottom:12px;animation:fadeUp .6s ease both;}
.page-head h1 em{font-style:normal;color:var(--orange);}
.page-head p{font-size:16px;color:var(--mid);line-height:1.7;animation:fadeUp .6s .1s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

/* ── MODE TABS ── */
.mode-tabs{display:flex;gap:8px;margin-bottom:18px;padding:4px;
  background:rgba(6,16,38,0.6);border-radius:12px;border:1px solid var(--border);}
.mtab{flex:1;padding:11px;background:transparent;border:none;cursor:pointer;
  font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;
  color:var(--dim);border-radius:8px;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.mtab.active{background:rgba(0,200,255,.12);color:var(--neon);box-shadow:0 0 16px rgba(0,200,255,.1);}
.mode-panel{display:none;}
.mode-panel.active{display:block;}

/* ── DROP ZONE ── */
.drop-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;min-height:200px;padding:30px;border-radius:var(--r);
  background:rgba(6,16,38,.8);border:2px dashed rgba(0,200,255,.25);
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.drop-zone:hover{border-color:var(--neon);background:rgba(0,200,255,.04);}
.drop-zone.drag{border-color:var(--neon);background:rgba(0,200,255,.08);border-style:solid;}
.dz-empty{display:flex;flex-direction:column;align-items:center;gap:10px;}
.dz-icon{font-size:54px;opacity:.6;}
.dz-text{font-size:15px;color:var(--mid);text-align:center;}
.dz-text strong{color:var(--neon);}
.dz-hint{font-size:12px;color:var(--dim);}
.dz-preview{display:none;max-width:100%;max-height:280px;border-radius:12px;
  box-shadow:0 8px 28px rgba(0,0,0,.5);}
.drop-zone.has-img .dz-empty{display:none;}
.drop-zone.has-img .dz-preview{display:block;}
.img-hints{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.hint-chip{padding:7px 14px;background:rgba(0,200,255,.05);border:1px solid var(--border);
  border-radius:100px;font-size:12px;color:var(--mid);}

/* ── INPUT CARD ── */
.input-card{width:100%;max-width:680px;padding:0 24px;animation:fadeUp .6s .15s ease both;}
.prompt-label{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;
  color:var(--mid);text-transform:uppercase;margin-bottom:10px;}
.prompt-area{
  width:100%;min-height:140px;resize:vertical;padding:20px;
  background:rgba(6,16,38,0.9);border:2px solid rgba(0,200,255,0.25);border-radius:var(--r);
  color:var(--bright);font-family:'Noto Sans SC',sans-serif;font-size:16px;line-height:1.7;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.prompt-area:focus{border-color:var(--neon);box-shadow:0 0 28px rgba(0,200,255,0.12);}
.prompt-area::placeholder{color:var(--dim);}

/* ── QUICK CHIPS ── */
.chips-label{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;
  color:var(--dim);margin:20px 0 10px;}
.chips{display:flex;gap:10px;flex-wrap:wrap;}
.chip{padding:10px 18px;background:rgba(0,200,255,0.06);border:1px solid rgba(0,200,255,0.2);
  border-radius:100px;font-size:14px;color:var(--mid);cursor:pointer;
  transition:all .2s;-webkit-tap-highlight-color:transparent;white-space:nowrap;}
.chip:hover,.chip:active{background:rgba(0,200,255,0.12);border-color:var(--neon);color:var(--bright);}

/* ── GENERATE BUTTON ── */
.btn-generate{
  width:100%;max-width:680px;margin:28px 24px 0;
  padding:22px;border:none;border-radius:var(--r);
  background:linear-gradient(135deg,var(--orange),#FF3300);
  color:#fff;font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;letter-spacing:2px;
  cursor:pointer;transition:all .25s;
  box-shadow:0 8px 40px rgba(255,107,26,0.4);
  display:flex;align-items:center;justify-content:center;gap:12px;
  animation:fadeUp .6s .2s ease both;
}
.btn-generate:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 14px 50px rgba(255,107,26,0.55);}
.btn-generate:active:not(:disabled){transform:scale(0.98);}
.btn-generate:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ── RESULT AREA ── */
.result-area{width:100%;max-width:680px;padding:0 24px;margin-top:36px;
  animation:fadeUp .6s .25s ease both;}

/* Idle hint */
.idle-hint{text-align:center;padding:48px 24px;
  border:2px dashed rgba(0,200,255,0.15);border-radius:var(--r);
  background:rgba(0,200,255,0.02);}
.idle-hint .hint-icon{font-size:52px;margin-bottom:16px;opacity:.6;}
.idle-hint p{font-size:14px;color:var(--dim);line-height:1.7;}
.idle-hint p strong{color:var(--mid);}

/* Generating */
.gen-box{padding:36px 32px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);}
.gen-title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;
  color:var(--neon);margin-bottom:24px;display:flex;align-items:center;gap:8px;}
.gen-dot{width:8px;height:8px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.progress-track{height:8px;background:rgba(0,200,255,0.08);border-radius:4px;overflow:hidden;margin-bottom:20px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--neon),#00FFE5);border-radius:4px;
  transition:width .4s ease;}
.steps{display:flex;flex-direction:column;gap:12px;}
.step{display:flex;align-items:center;gap:14px;padding:10px 0;
  border-bottom:1px solid rgba(0,200,255,0.05);font-size:14px;color:var(--dim);transition:color .3s;}
.step.active{color:var(--bright);}
.step.done{color:var(--green);}
.step-icon{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--dim);
  display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all .3s;}
.step.active .step-icon{border-color:var(--neon);color:var(--neon);box-shadow:0 0 10px rgba(0,200,255,0.3);}
.step.done .step-icon{border-color:var(--green);background:rgba(59,255,90,0.1);color:var(--green);}

/* Done */
.done-box{padding:40px 32px;background:var(--card);border:1px solid rgba(59,255,90,0.2);
  border-radius:var(--r);text-align:center;}
.done-cube-wrap{perspective:500px;margin-bottom:28px;}
.done-cube{width:80px;height:80px;transform-style:preserve-3d;margin:0 auto;
  animation:spinDone 10s linear infinite;}
@keyframes spinDone{from{transform:rotateX(22deg) rotateY(0);}to{transform:rotateX(22deg) rotateY(360deg);}}
.done-face{position:absolute;width:80px;height:80px;border:1.5px solid rgba(59,255,90,0.5);
  background:rgba(59,255,90,0.04);display:flex;align-items:center;justify-content:center;font-size:24px;}
.done-face.fr{transform:translateZ(40px);}
.done-face.bk{transform:rotateY(180deg) translateZ(40px);}
.done-face.lt{transform:rotateY(-90deg) translateZ(40px);}
.done-face.rt{transform:rotateY(90deg) translateZ(40px);}
.done-face.tp{transform:rotateX(90deg) translateZ(40px);}
.done-face.bt{transform:rotateX(-90deg) translateZ(40px);}
.done-title{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;
  color:var(--green);margin-bottom:8px;}
.done-sub{font-size:14px;color:var(--mid);margin-bottom:28px;}
.done-stats{display:flex;justify-content:center;gap:32px;margin-bottom:28px;}
.done-stat{display:flex;flex-direction:column;gap:4px;align-items:center;}
.done-stat-val{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--bright);}
.done-stat-label{font-size:11px;color:var(--dim);font-family:'Orbitron',sans-serif;letter-spacing:1px;}
.done-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-print{padding:14px 32px;background:linear-gradient(135deg,var(--orange),#FF3300);
  border:none;border-radius:12px;color:#fff;font-family:'Orbitron',sans-serif;
  font-size:13px;font-weight:900;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.btn-print:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,26,.4);}
.btn-again{padding:14px 32px;background:transparent;border:1.5px solid var(--border);
  border-radius:12px;color:var(--mid);font-family:'Orbitron',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.btn-again:hover{border-color:var(--neon);color:var(--neon);}

/* ── BOTTOM NAV ── */
nav.bnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;height:68px;
  background:rgba(3,8,18,0.96);backdrop-filter:blur(24px);border-top:1px solid rgba(0,200,255,0.12);
  padding:0 8px;justify-content:space-around;align-items:center;}
.bn{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;
  color:var(--dim);padding:6px 12px;transition:color .2s;-webkit-tap-highlight-color:transparent;flex:1;}
.bn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.bn span{font-size:10px;font-weight:700;font-family:'Orbitron',sans-serif;letter-spacing:.5px;}
.bn.active{color:var(--orange);}
.bn.active svg{filter:drop-shadow(0 0 5px var(--orange));}
.bn-fab{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--orange),#FF3300);
  display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(255,107,26,0.6);
  margin-top:-18px;border:3px solid rgba(3,8,18,0.9);text-decoration:none;flex-shrink:0;
  transition:transform .15s;-webkit-tap-highlight-color:transparent;}
.bn-fab:active{transform:scale(0.92);}
.bn-fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

@media(max-width:1280px){
  nav.top ul{display:none;}nav.top{padding:0 16px;}
  nav.bnav{display:flex;}
  .page-head{padding:40px 20px 28px;}
  .input-card,.btn-generate,.result-area{padding-left:16px;padding-right:16px;}
  .btn-generate{margin-left:16px;margin-right:16px;}
  .chips{gap:8px;}
  .chip{font-size:13px;padding:9px 14px;}
}
@media(hover:none){
  .chip:active{background:rgba(0,200,255,0.14);border-color:var(--neon);color:var(--bright);}
  .btn-generate:active:not(:disabled){transform:scale(0.97);}
}
</style>
</head>

<div class="wrap">

<script>
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const stars=Array.from({length:180},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.3+.3,a:Math.random(),s:Math.random()*.003+.001}));
  (function draw(){ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{s.a+=s.s;if(s.a>1){s.a=0;s.x=Math.random();s.y=Math.random();}
      ctx.globalAlpha=s.a*.7;ctx.fillStyle='#E8F8FF';
      ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;requestAnimationFrame(draw);})();
})();

const CHIPS=['🦕 一只恐龙','🚀 太空火箭','🏰 神秘城堡','🤖 可爱机器人','🦋 展翅蝴蝶','🌋 喷发火山'];
const STEPS=[
  {icon:'🔍',text:'分析你的描述…'},
  {icon:'✏️',text:'生成 3D 结构…'},
  {icon:'🎨',text:'优化模型细节…'},
  {icon:'✅',text:'生成完成！'},
];

document.getElementById('chips').innerHTML=CHIPS.map(c=>`
  <div class="chip" onclick="useChip(this,'${c}')">${c}</div>`).join('');

function useChip(el, text){
  document.getElementById('promptInput').value=text;
  document.querySelectorAll('.chip').forEach(c=>c.style.borderColor='');
  el.style.borderColor='var(--neon)';
  el.style.color='var(--bright)';
}

function showIdle(){
  document.getElementById('resultArea').innerHTML=`
    <div class="idle-hint">
      <div class="hint-icon">🎨</div>
      <p><strong>在上方输入你的想法</strong><br>比如动物、太空、机械、建筑……<br>AI 会在几秒内帮你生成专属 3D 模型</p>
    </div>`;
}

let curMode='text', uploadedImg=null;

function setMode(el,m){
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.mode-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(m==='text'?'modeText':'modeImage').classList.add('active');
  curMode=m;
  /* update button label */
  const btn=document.getElementById('genBtn');
  btn.innerHTML=m==='image'
    ? '<span>🖼️</span> 从图片生成模型'
    : '<span>🚀</span> 开始生成我的模型';
}

function onFile(input){
  const f=input.files&&input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const img=document.getElementById('dzPreview');
    img.src=e.target.result;
    document.getElementById('dropZone').classList.add('has-img');
    uploadedImg=e.target.result;
  };
  r.readAsDataURL(f);
}
const dz=document.getElementById('dropZone');
['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('drag');}));
dz.addEventListener('drop',e=>{
  const f=e.dataTransfer.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{
    document.getElementById('dzPreview').src=ev.target.result;
    dz.classList.add('has-img');uploadedImg=ev.target.result;
  };r.readAsDataURL(f);
});

async function startGenerate(){
  let prompt='';
  if(curMode==='text'){
    prompt=document.getElementById('promptInput').value.trim();
    if(!prompt){
      document.getElementById('promptInput').focus();
      document.getElementById('promptInput').style.borderColor='var(--orange)';
      setTimeout(()=>document.getElementById('promptInput').style.borderColor='',1500);
      return;
    }
  }else{
    if(!uploadedImg){
      document.getElementById('dropZone').style.borderColor='var(--orange)';
      setTimeout(()=>document.getElementById('dropZone').style.borderColor='',1500);
      return;
    }
    prompt='从图片创作的模型';
  }
  const btn=document.getElementById('genBtn');
  btn.disabled=true;
  btn.innerHTML='<span>⏳</span> 生成中…';

  const ra=document.getElementById('resultArea');
  ra.innerHTML=`
    <div class="gen-box">
      <div class="gen-title"><div class="gen-dot"></div>AI 正在创作中</div>
      <div class="progress-track"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
      <div class="steps" id="stepList">
        ${STEPS.map(s=>`<div class="step" data-step>
          <div class="step-icon">${s.icon}</div>
          <span>${s.text}</span>
        </div>`).join('')}
      </div>
    </div>`;

  const stepEls=document.querySelectorAll('[data-step]');
  const fill=document.getElementById('pFill');

  for(let i=0;i<STEPS.length;i++){
    stepEls[i].className='step active';
    const target=(i+1)/STEPS.length*100;
    await animate(pct=>{fill.style.width=pct+'%';},
      i/STEPS.length*100, target, 900);
    stepEls[i].className='step done';
    stepEls[i].querySelector('.step-icon').textContent='✓';
  }

  showDone(prompt);
  btn.disabled=false;
  btn.innerHTML='<span>🚀</span> 重新生成';
}

function animate(setter,from,to,ms){
  return new Promise(res=>{
    const start=performance.now();
    (function tick(now){
      const p=Math.min((now-start)/ms,1);
      setter(from+(to-from)*(1-Math.pow(1-p,3)));
      if(p<1) requestAnimationFrame(tick); else res();
    })(performance.now());
  });
}

function showDone(prompt){
  document.getElementById('resultArea').innerHTML=`
    <div class="done-box">
      <div class="done-cube-wrap">
        <div class="done-cube">
          <div class="done-face fr">✨</div><div class="done-face bk">⭐</div>
          <div class="done-face lt">🎨</div><div class="done-face rt">💡</div>
          <div class="done-face tp">🔧</div><div class="done-face bt">🌟</div>
        </div>
      </div>
      <div class="done-title">模型生成成功！</div>
      <div class="done-sub">「${prompt.slice(0,20)}${prompt.length>20?'…':''}」已准备好打印</div>
      <div class="done-stats">
        <div class="done-stat"><div class="done-stat-val">3.2h</div><div class="done-stat-label">预计打印</div></div>
        <div class="done-stat"><div class="done-stat-val">18g</div><div class="done-stat-label">耗材用量</div></div>
        <div class="done-stat"><div class="done-stat-val">+120</div><div class="done-stat-label">获得经验</div></div>
      </div>
      <div class="done-actions">
        <button class="btn-print">🖨️ 发送打印</button>
        <button class="btn-again" onclick="resetAll()">再创作一个</button>
      </div>
    </div>`;
}

function resetAll(){
  document.getElementById('promptInput').value='';
  document.getElementById('genBtn').innerHTML='<span>🚀</span> 开始生成我的模型';
  document.getElementById('genBtn').disabled=false;
  document.querySelectorAll('.chip').forEach(c=>{c.style.borderColor='';c.style.color='';});
  showIdle();
}

showIdle();
</script>
