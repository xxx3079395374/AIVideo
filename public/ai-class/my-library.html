<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的资源库 · FORGE3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#030812;--card:rgba(8,20,42,0.88);
  --neon:#00C8FF;--orange:#FF6B1A;--green:#3BFF5A;--gold:#FFB800;--purple:#C060FF;
  --bright:#E8F8FF;--mid:#6B9AB5;--dim:#2E4F68;
  --border:rgba(0,200,255,0.14);--r:16px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--void);color:var(--bright);font-family:'Noto Sans SC',sans-serif;overflow-x:hidden;min-height:100vh;}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.gbg{position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:linear-gradient(rgba(0,200,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.018) 1px,transparent 1px);
  background-size:64px 64px;}

nav.top{position:fixed;inset:0 0 auto 0;z-index:100;height:64px;padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(3,8,18,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo svg{width:32px;height:32px;}
.logo-name{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,var(--neon),#00FFE5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
nav.top ul{display:flex;gap:24px;list-style:none;}
nav.top ul a{color:var(--mid);text-decoration:none;font-size:12px;font-weight:700;letter-spacing:1.5px;font-family:'Orbitron',sans-serif;transition:color .2s;}
nav.top ul a:hover,nav.top ul a.active{color:var(--neon);}

.wrap{position:relative;z-index:10;padding-top:64px;}
.page-head{padding:40px 40px 24px;max-width:1100px;margin:0 auto;text-align:center;}
.page-head h1{font-family:'Orbitron',sans-serif;font-size:clamp(26px,4vw,40px);font-weight:900;margin-bottom:10px;}
.page-head h1 em{font-style:normal;color:var(--neon);}
.page-head p{font-size:15px;color:var(--mid);}

/* Tabs */
.tabs-bar{position:sticky;top:64px;z-index:40;background:rgba(3,8,18,0.95);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--border);
  padding:0 40px;display:flex;justify-content:center;gap:8px;overflow-x:auto;scrollbar-width:none;}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab-btn{padding:14px 22px;background:transparent;border:none;cursor:pointer;
  font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;
  color:var(--dim);transition:color .2s;-webkit-tap-highlight-color:transparent;
  position:relative;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.tab-btn::after{content:'';position:absolute;left:14px;right:14px;bottom:0;height:2px;
  background:var(--neon);transform:scaleX(0);transition:transform .25s;border-radius:1px;}
.tab-btn.active{color:var(--neon);}
.tab-btn.active::after{transform:scaleX(1);}
.tab-count{padding:2px 8px;background:rgba(0,200,255,.1);border-radius:100px;
  font-size:10px;color:var(--mid);}
.tab-btn.active .tab-count{background:rgba(0,200,255,.2);color:var(--neon);}

/* Toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;
  max-width:1100px;margin:0 auto;padding:24px 40px 16px;gap:16px;flex-wrap:wrap;}
.tool-left{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--mid);letter-spacing:1px;}
.tool-actions{display:flex;gap:10px;}
.btn-tool{padding:8px 16px;background:rgba(0,200,255,.06);border:1px solid var(--border);
  border-radius:8px;color:var(--mid);font-family:'Orbitron',sans-serif;font-size:11px;
  font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:5px;}
.btn-tool:hover{border-color:var(--neon);color:var(--neon);}
.btn-tool.danger:hover{border-color:#FF4D4F;color:#FF4D4F;}

/* Grid */
.lib-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
  max-width:1100px;margin:0 auto;padding:0 40px 120px;}
.item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;cursor:pointer;transition:all .22s;position:relative;}
.item:hover{transform:translateY(-4px);border-color:var(--neon);box-shadow:0 12px 36px rgba(0,0,0,0.5);}
.item-thumb{height:130px;display:flex;align-items:center;justify-content:center;
  font-size:54px;background:rgba(0,200,255,0.04);position:relative;}
.item-check{position:absolute;top:10px;left:10px;width:22px;height:22px;
  border:1.5px solid var(--mid);border-radius:6px;background:rgba(3,8,18,.7);
  display:flex;align-items:center;justify-content:center;color:transparent;
  transition:all .2s;font-weight:900;font-size:13px;}
.item.selected .item-check{background:var(--neon);border-color:var(--neon);color:#000;}
.item.selected{border-color:var(--neon);box-shadow:0 0 18px rgba(0,200,255,.3);}
.item-tag{position:absolute;top:10px;right:10px;padding:3px 8px;border-radius:5px;
  font-family:'Orbitron',sans-serif;font-size:9px;font-weight:900;letter-spacing:.5px;}
.tag-ai{background:rgba(192,96,255,.85);color:#fff;}
.tag-fav{background:rgba(255,184,0,.85);color:#000;}
.tag-class{background:rgba(0,200,255,.85);color:#000;}
.tag-assembled{background:rgba(59,255,90,.85);color:#000;}
.item-body{padding:14px 16px;}
.item-name{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--bright);margin-bottom:6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-meta{display:flex;justify-content:space-between;gap:8px;font-size:11px;color:var(--dim);}

.empty{padding:80px 24px;text-align:center;color:var(--dim);}
.empty-icon{font-size:64px;margin-bottom:16px;opacity:.5;}
.empty-text{font-size:15px;margin-bottom:18px;color:var(--mid);}
.btn-empty{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;
  background:linear-gradient(135deg,var(--orange),#FF3300);color:#fff;border:none;
  border-radius:12px;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;
  letter-spacing:1px;cursor:pointer;text-decoration:none;transition:all .2s;}
.btn-empty:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,26,.4);}

/* Action bar shown when items selected */
.action-bar{position:fixed;bottom:0;left:0;right:0;z-index:150;
  background:rgba(3,8,18,.97);backdrop-filter:blur(20px);border-top:1px solid var(--neon);
  padding:14px 40px;display:none;align-items:center;justify-content:space-between;gap:16px;
  transform:translateY(100%);transition:transform .3s ease;}
.action-bar.show{display:flex;transform:translateY(0);}
.ab-count{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--neon);font-weight:700;letter-spacing:1px;}
.ab-actions{display:flex;gap:10px;}
.btn-ab{padding:10px 20px;border-radius:10px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1px;cursor:pointer;border:none;transition:all .2s;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;gap:5px;}
.btn-ab.print{background:linear-gradient(135deg,var(--orange),#FF3300);color:#fff;}
.btn-ab.move{background:rgba(0,200,255,.1);color:var(--neon);border:1px solid rgba(0,200,255,.25);}
.btn-ab.del{background:rgba(255,77,79,.1);color:#FF4D4F;border:1px solid rgba(255,77,79,.25);}

/* ── BOTTOM NAV ── */
nav.bnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;height:68px;
  background:rgba(3,8,18,0.97);backdrop-filter:blur(24px);border-top:1px solid rgba(0,200,255,0.12);
  padding:0 8px;justify-content:space-around;align-items:center;}
.bn{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;
  color:var(--dim);padding:6px 12px;transition:color .2s;-webkit-tap-highlight-color:transparent;flex:1;}
.bn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.bn span{font-size:10px;font-weight:700;font-family:'Orbitron',sans-serif;letter-spacing:.5px;}
.bn.active{color:var(--neon);}
.bn.active svg{filter:drop-shadow(0 0 5px var(--neon));}
.bn-fab{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--orange),#FF3300);
  display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(255,107,26,0.45);
  margin-top:-18px;border:3px solid rgba(3,8,18,0.9);text-decoration:none;flex-shrink:0;
  transition:transform .15s;-webkit-tap-highlight-color:transparent;}
.bn-fab:active{transform:scale(0.92);}
.bn-fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

@media(max-width:1280px){
  nav.top ul{display:none;}nav.top{padding:0 16px;}
  nav.bnav{display:flex;}
  .page-head{padding:28px 16px 20px;}
  .tabs-bar{padding:0 8px;justify-content:flex-start;}
  .tab-btn{padding:13px 14px;font-size:11px;}
  .toolbar{padding:20px 16px 14px;}
  .lib-grid{grid-template-columns:repeat(2,1fr);padding:0 16px 100px;gap:12px;}
  .item-thumb{height:108px;font-size:42px;}
  .action-bar{padding:12px 16px;margin-bottom:68px;}
  .btn-ab{padding:10px 14px;font-size:11px;}
}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="gbg"></div>

<nav class="top">
  <a href="index.html" class="logo">
    <svg viewBox="0 0 34 34" fill="none">
      <polygon points="17,2 32,10 32,24 17,32 2,24 2,10" stroke="url(#lgLib)" stroke-width="1.5" fill="rgba(0,200,255,0.06)"/>
      <defs><linearGradient id="lgLib" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00C8FF"/><stop offset="100%" stop-color="#00FFE5"/></linearGradient></defs>
    </svg>
    <span class="logo-name">FORGE3D</span>
  </a>
  <ul>
    <li><a href="index.html">首页</a></li>
    <li><a href="library.html">探索</a></li>
    <li><a href="learn.html">学习</a></li>
    <li><a href="ai-create.html">AI创作</a></li>
    <li><a href="profile.html" class="active">我的</a></li>
  </ul>
</nav>

<div class="wrap">
  <div class="page-head">
    <h1>💾 <em>我的资源库</em></h1>
    <p>这里有你收藏的、创作的、学过的所有模型</p>
  </div>

  <div class="tabs-bar">
    <button class="tab-btn active" data-cat="fav" onclick="setCat(this,'fav')">⭐ 我的收藏 <span class="tab-count" id="cFav">0</span></button>
    <button class="tab-btn" data-cat="ai" onclick="setCat(this,'ai')">🤖 AI创作 <span class="tab-count" id="cAi">0</span></button>
    <button class="tab-btn" data-cat="assembled" onclick="setCat(this,'assembled')">🔧 已组装 <span class="tab-count" id="cAs">0</span></button>
    <button class="tab-btn" data-cat="class" onclick="setCat(this,'class')">📚 学习模型 <span class="tab-count" id="cCl">0</span></button>
  </div>

  <div class="toolbar">
    <div class="tool-left" id="toolCount"></div>
    <div class="tool-actions">
      <button class="btn-tool" onclick="toggleSelect()" id="btnSelect">☑ 选择</button>
    </div>
  </div>

  <div class="lib-grid" id="libGrid"></div>
</div>

<!-- Floating action bar shown during multi-select -->
<div class="action-bar" id="actionBar">
  <div class="ab-count" id="abCount">已选 0 个</div>
  <div class="ab-actions">
    <button class="btn-ab move" onclick="moveSelected()">📁 移动</button>
    <button class="btn-ab del" onclick="deleteSelected()">🗑 删除</button>
    <button class="btn-ab print" onclick="printSelected()">🖨 打印</button>
  </div>
</div>

<nav class="bnav">
  <a href="index.html" class="bn">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>首页</span>
  </a>
  <a href="library.html" class="bn">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>探索</span>
  </a>
  <a href="ai-create.html" class="bn-fab">
    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
  </a>
  <a href="learn.html" class="bn">
    <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
    <span>学习</span>
  </a>
  <a href="profile.html" class="bn active">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>我的</span>
  </a>
</nav>

<script>
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const stars=Array.from({length:160},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.3+.3,a:Math.random(),s:Math.random()*.003+.001}));
  (function draw(){ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{s.a+=s.s;if(s.a>1){s.a=0;s.x=Math.random();s.y=Math.random();}
      ctx.globalAlpha=s.a*.65;ctx.fillStyle='#E8F8FF';
      ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;requestAnimationFrame(draw);})();
})();

const ITEMS=[
  {id:1,cat:'fav',name:'霸王龙模型',emoji:'🦖',date:'5月10日',size:'10cm'},
  {id:2,cat:'fav',name:'太空火箭',emoji:'🚀',date:'5月8日',size:'15cm'},
  {id:3,cat:'fav',name:'埃菲尔铁塔',emoji:'🗼',date:'5月5日',size:'20cm'},
  {id:4,cat:'fav',name:'月球地形',emoji:'🌕',date:'5月2日',size:'8cm'},
  {id:5,cat:'ai',name:'我的太空船',emoji:'🛸',date:'5月12日',size:'12cm'},
  {id:6,cat:'ai',name:'未来机器人',emoji:'🤖',date:'5月11日',size:'10cm'},
  {id:7,cat:'ai',name:'梦中小屋',emoji:'🏠',date:'5月7日',size:'8cm'},
  {id:8,cat:'assembled',name:'宇航员组合',emoji:'👨‍🚀',date:'5月9日',size:'14cm'},
  {id:9,cat:'assembled',name:'恐龙骑士',emoji:'🐉',date:'5月3日',size:'16cm'},
  {id:10,cat:'class',name:'坐标教学模型',emoji:'📐',date:'5月13日',size:'5cm'},
  {id:11,cat:'class',name:'齿轮原理',emoji:'⚙️',date:'5月12日',size:'6cm'},
  {id:12,cat:'class',name:'桥梁结构',emoji:'🌉',date:'5月10日',size:'10cm'},
];

const TAG_MAP={fav:{cls:'tag-fav',txt:'⭐'},ai:{cls:'tag-ai',txt:'AI'},assembled:{cls:'tag-assembled',txt:'🔧'},class:{cls:'tag-class',txt:'📚'}};
const EMPTY_MAP={
  fav:{icon:'⭐',text:'还没有收藏任何模型',btn:'去探索模型库',href:'library.html'},
  ai:{icon:'🤖',text:'还没有 AI 创作的模型',btn:'立即创作',href:'ai-create.html'},
  assembled:{icon:'🔧',text:'还没有组装过模型',btn:'去组装',href:'assemble.html'},
  class:{icon:'📚',text:'还没有保存学习模型',btn:'开始学习',href:'learn.html'},
};

let curCat='fav', selectMode=false, selected=new Set();

function setCat(el,cat){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  curCat=cat;selected.clear();renderGrid();
}

function updateCounts(){
  ['fav','ai','assembled','class'].forEach(c=>{
    const n=ITEMS.filter(i=>i.cat===c).length;
    const key={fav:'cFav',ai:'cAi',assembled:'cAs',class:'cCl'}[c];
    document.getElementById(key).textContent=n;
  });
}

function renderGrid(){
  const list=ITEMS.filter(i=>i.cat===curCat);
  const grid=document.getElementById('libGrid');
  document.getElementById('toolCount').textContent=`共 ${list.length} 个`;
  if(!list.length){
    const e=EMPTY_MAP[curCat];
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">${e.icon}</div>
      <div class="empty-text">${e.text}</div>
      <a href="${e.href}" class="btn-empty">${e.btn} →</a>
    </div>`;
    return;
  }
  const tag=TAG_MAP[curCat];
  grid.innerHTML=list.map(i=>`
    <div class="item${selected.has(i.id)?' selected':''}" onclick="onItemClick(${i.id},'${i.name}','${i.emoji}')">
      <div class="item-thumb">
        ${selectMode?'<div class="item-check">✓</div>':''}
        ${i.emoji}
        <div class="item-tag ${tag.cls}">${tag.txt}</div>
      </div>
      <div class="item-body">
        <div class="item-name">${i.name}</div>
        <div class="item-meta"><span>${i.date}</span><span>${i.size}</span></div>
      </div>
    </div>`).join('');
}

function onItemClick(id,name,emoji){
  if(selectMode){
    selected.has(id)?selected.delete(id):selected.add(id);
    renderGrid();updateActionBar();
  }else{
    location.href=`model-detail.html?name=${encodeURIComponent(name)}&emoji=${encodeURIComponent(emoji)}`;
  }
}

function toggleSelect(){
  selectMode=!selectMode;
  if(!selectMode)selected.clear();
  document.getElementById('btnSelect').textContent=selectMode?'✕ 取消':'☑ 选择';
  renderGrid();updateActionBar();
}

function updateActionBar(){
  const ab=document.getElementById('actionBar');
  if(selectMode&&selected.size){
    ab.classList.add('show');
    document.getElementById('abCount').textContent=`已选 ${selected.size} 个`;
  }else{ab.classList.remove('show');}
}

function moveSelected(){alert(`移动 ${selected.size} 个模型到...`);}
function deleteSelected(){
  if(confirm(`确定删除 ${selected.size} 个模型？`)){
    selected.forEach(id=>{const i=ITEMS.findIndex(x=>x.id===id);if(i>=0)ITEMS.splice(i,1);});
    selected.clear();updateCounts();renderGrid();updateActionBar();
  }
}
function printSelected(){location.href='print.html';}

updateCounts();renderGrid();
</script>
</body>
</html>
