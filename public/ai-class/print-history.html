<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打印历史 · FORGE3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#030812;--card:rgba(8,20,42,0.9);
  --neon:#00C8FF;--orange:#FF6B1A;--green:#3BFF5A;--gold:#FFB800;--red:#FF4060;
  --bright:#E8F8FF;--mid:#6B9AB5;--dim:#2E4F68;
  --border:rgba(0,200,255,0.14);--r:18px;--bnav:68px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--void);color:var(--bright);font-family:'Noto Sans SC',sans-serif;
  overflow-x:hidden;min-height:100vh;}

/* ── BACKGROUND ── */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.gbg{position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:linear-gradient(rgba(0,200,255,0.018) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,200,255,0.018) 1px,transparent 1px);
  background-size:64px 64px;}
.scanline{position:fixed;left:0;right:0;top:-4px;height:4px;z-index:2;pointer-events:none;
  background:linear-gradient(transparent,rgba(0,200,255,0.05),transparent);
  animation:scan 8s linear infinite;}
@keyframes scan{to{top:100vh;}}

/* ── TOP NAV ── */
nav.top{position:fixed;inset:0 0 auto 0;z-index:100;height:64px;padding:0 32px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(3,8,18,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--neon),#0050CC);
  border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-name{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,var(--neon),#00FFE5);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
.nav-back{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--mid);
  font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;
  transition:color .2s;cursor:pointer;}
.nav-back:hover{color:var(--neon);}
.nav-back svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;}
nav.top ul{display:flex;gap:20px;list-style:none;}
nav.top ul a{color:var(--mid);text-decoration:none;font-size:11px;font-weight:700;
  letter-spacing:1.5px;font-family:'Orbitron',sans-serif;transition:color .2s;}
nav.top ul a:hover,nav.top ul a.active{color:var(--neon);}
@media(max-width:1280px){nav.top ul{display:none;}}

/* ── PAGE LAYOUT ── */
.wrap{position:relative;z-index:10;padding-top:64px;padding-bottom:calc(var(--bnav) + 20px);}
.inner{max-width:640px;margin:0 auto;padding:32px 20px 24px;}

/* ── PAGE HEADER ── */
.page-header{margin-bottom:28px;animation:fadeUp .4s ease both;}
.page-title{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;
  letter-spacing:2px;color:var(--bright);display:flex;align-items:center;gap:10px;}
.page-title span{font-size:26px;}
.page-sub{font-size:13px;color:var(--mid);margin-top:6px;letter-spacing:.5px;}

/* ── STATS STRIP ── */
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
  background:var(--border);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;margin-bottom:24px;
  animation:fadeUp .5s ease .05s both;}
.stat-cell{background:var(--card);padding:16px 12px;text-align:center;}
.stat-val{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;
  color:var(--neon);line-height:1;}
.stat-unit{font-size:10px;color:var(--neon);opacity:.7;margin-left:2px;}
.stat-lbl{font-size:11px;color:var(--mid);margin-top:5px;letter-spacing:.5px;}

/* ── FILTER TABS ── */
.filter-row{display:flex;gap:8px;margin-bottom:20px;animation:fadeUp .5s ease .1s both;}
.ftab{padding:8px 18px;border-radius:100px;border:1px solid var(--border);
  background:transparent;color:var(--mid);font-family:'Noto Sans SC',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
.ftab.active{background:rgba(0,200,255,0.15);border-color:var(--neon);color:var(--neon);}
.ftab:hover:not(.active){border-color:rgba(0,200,255,.35);color:var(--bright);}

/* ── MISSION LOG LIST ── */
.log-list{display:flex;flex-direction:column;gap:12px;}

/* ── MISSION CARD ── */
.mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;display:flex;align-items:stretch;
  transition:border-color .25s,transform .2s,box-shadow .25s;
  animation:fadeUp .5s ease both;cursor:default;}
.mcard:hover{border-color:rgba(0,200,255,.4);transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,200,255,.1);}
.mcard.fail{border-color:rgba(255,64,96,.2);}
.mcard.fail:hover{border-color:rgba(255,64,96,.45);box-shadow:0 8px 32px rgba(255,64,96,.1);}

/* Card left strip - status color */
.mcard-strip{width:4px;flex-shrink:0;}
.mcard-strip.ok{background:linear-gradient(to bottom,var(--green),rgba(59,255,90,.3));}
.mcard-strip.fail{background:linear-gradient(to bottom,var(--red),rgba(255,64,96,.3));}

/* Emoji preview */
.mcard-thumb{width:72px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:36px;background:rgba(0,200,255,0.04);border-right:1px solid var(--border);
  position:relative;}
.mcard-thumb::after{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at center,rgba(0,200,255,0.06),transparent 70%);}

/* Card body */
.mcard-body{flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:8px;min-width:0;}
.mcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.mcard-name{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;
  color:var(--bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mcard-status{flex-shrink:0;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;
  font-family:'Orbitron',sans-serif;letter-spacing:.5px;}
.mcard-status.ok{background:rgba(59,255,90,.12);color:var(--green);border:1px solid rgba(59,255,90,.25);}
.mcard-status.fail{background:rgba(255,64,96,.12);color:var(--red);border:1px solid rgba(255,64,96,.25);}

.mcard-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--mid);}
.meta-item svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;
  stroke-linecap:round;flex-shrink:0;}

/* Quality rating */
.mcard-rating{display:flex;align-items:center;gap:10px;}
.rating-label{font-size:11px;color:var(--mid);letter-spacing:.3px;}
.stars{display:flex;gap:2px;}
.star{font-size:16px;line-height:1;transition:transform .15s;}
.star.lit{filter:drop-shadow(0 0 4px rgba(255,184,0,.6));}
.star.dim{opacity:.25;}

/* Actions */
.mcard-actions{display:flex;gap:8px;margin-top:4px;}
.mact{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:100px;
  border:1px solid var(--border);background:transparent;color:var(--mid);
  font-family:'Noto Sans SC',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s;}
.mact:hover{border-color:var(--neon);color:var(--neon);background:rgba(0,200,255,.08);}
.mact.primary{border-color:rgba(255,107,26,.4);color:var(--orange);}
.mact.primary:hover{background:rgba(255,107,26,.12);border-color:var(--orange);}
.mact svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;}

/* ── MISSION ID ── */
.mission-id{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--dim);
  letter-spacing:1px;margin-top:2px;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:80px 24px;animation:fadeUp .5s ease both;}
.empty-icon{font-size:64px;margin-bottom:20px;display:block;
  animation:floatY 3s ease-in-out infinite;}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.empty-title{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;
  color:var(--bright);margin-bottom:10px;}
.empty-sub{font-size:14px;color:var(--mid);line-height:1.7;margin-bottom:24px;}
.btn-go{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;
  background:var(--orange);border-radius:100px;color:#fff;font-weight:700;
  font-size:14px;text-decoration:none;transition:all .2s;border:none;cursor:pointer;}
.btn-go:hover{filter:brightness(1.15);transform:translateY(-2px);}

/* ── RATE MODAL ── */
.modal-bg{position:fixed;inset:0;z-index:300;background:rgba(3,8,18,.85);
  backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:rgba(8,20,42,.97);border:1px solid var(--border);border-radius:24px;
  padding:36px 32px;max-width:340px;width:calc(100% - 48px);text-align:center;
  transform:scale(.92) translateY(20px);transition:transform .3s;}
.modal-bg.open .modal{transform:none;}
.modal h3{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;
  color:var(--bright);margin-bottom:8px;}
.modal-sub{font-size:13px;color:var(--mid);margin-bottom:28px;}
.modal-emoji{font-size:48px;margin-bottom:16px;display:block;}
.rate-stars{display:flex;gap:12px;justify-content:center;margin-bottom:28px;cursor:pointer;}
.rate-star{font-size:36px;transition:transform .15s;filter:grayscale(1) opacity(.3);}
.rate-star.sel{filter:none;transform:scale(1.15);}
.modal-btn{width:100%;padding:14px;background:var(--orange);border:none;border-radius:100px;
  color:#fff;font-family:'Noto Sans SC',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .2s;}
.modal-btn:hover{filter:brightness(1.15);}
.modal-close{margin-top:12px;background:transparent;border:none;color:var(--mid);
  font-size:13px;cursor:pointer;display:block;width:100%;padding:8px;transition:color .2s;}
.modal-close:hover{color:var(--bright);}

/* ── BOTTOM NAV (tablet) ── */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bnav);z-index:200;
  background:rgba(3,8,18,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);
  align-items:center;justify-content:space-around;}
@media(max-width:1280px){.bnav{display:flex;}}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;
  text-decoration:none;color:var(--dim);font-family:'Noto Sans SC',sans-serif;
  font-size:10px;font-weight:700;transition:color .2s;letter-spacing:.5px;}
.bnav-item:hover,.bnav-item.active{color:var(--neon);}
.bnav-item svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}
.bnav-fab{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--orange),#FF3D00);
  display:flex;align-items:center;justify-content:center;text-decoration:none;
  box-shadow:0 0 20px rgba(255,107,26,.45);font-size:22px;
  transform:translateY(-10px);transition:all .2s;}
.bnav-fab:hover{transform:translateY(-14px) scale(1.08);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}

/* responsive */
@media(max-width:480px){
  .stats-strip{grid-template-columns:repeat(2,1fr);}
  .mcard-thumb{width:60px;font-size:28px;}
  .mcard-name{font-size:13px;}
  nav.top{padding:0 20px;}
}
</style>
</head>

<script>
/* ── STARFIELD ── */
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  let W,H,pts=[];
  function init(){
    W=c.width=window.innerWidth;H=c.height=window.innerHeight;
    pts=Array.from({length:120},()=>({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*.8+.2,o:Math.random()*.7+.2,
      sp:Math.random()*1.5+.3
    }));
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.o+=Math.sin(Date.now()/800*p.sp)*0.008;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,220,255,${Math.max(0.1,Math.min(0.9,p.o))})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',init);init();draw();
})();

/* ── DATA ── */
const HISTORY = [
  {id:'M-2024-042',name:'迷你火箭',emoji:'🚀',date:'2024-05-10',duration:45,weight:12,status:'ok',stars:5,material:'蓝色PLA'},
  {id:'M-2024-038',name:'霸王龙',emoji:'🦖',date:'2024-05-07',duration:180,weight:68,status:'ok',stars:4,material:'绿色PLA'},
  {id:'M-2024-035',name:'小章鱼',emoji:'🐙',date:'2024-05-02',duration:90,weight:28,status:'ok',stars:0,material:'紫色PLA'},
  {id:'M-2024-031',name:'城堡模型',emoji:'🏰',date:'2024-04-28',duration:240,weight:95,status:'fail',stars:0,material:'灰色PLA'},
  {id:'M-2024-027',name:'宇宙飞船',emoji:'🛸',date:'2024-04-20',duration:120,weight:42,status:'ok',stars:5,material:'银色PLA'},
  {id:'M-2024-019',name:'小猫咪',emoji:'🐱',date:'2024-04-10',duration:60,weight:18,status:'ok',stars:3,material:'橙色PLA'},
  {id:'M-2024-012',name:'海豚',emoji:'🐬',date:'2024-04-01',duration:75,weight:24,status:'fail',stars:0,material:'白色PLA'},
];

let curFilter='all';
let ratingTarget=null;
let selectedStar=0;

/* ── STATS ── */
function computeStats(){
  const total=HISTORY.length;
  const hours=Math.round(HISTORY.reduce((a,h)=>a+h.duration,0)/60*10)/10;
  const ok=HISTORY.filter(h=>h.status==='ok').length;
  const pct=Math.round(ok/total*100);
  const grams=HISTORY.reduce((a,h)=>a+h.weight,0);

  document.getElementById('totalCount').textContent=total;
  animVal('sv1',total,'');
  animVal('sv2',hours,'h');
  animVal('sv3',pct,'%');
  animVal('sv4',grams,'g');
}
function animVal(id,target,unit){
  const el=document.getElementById(id);
  const start=performance.now();
  const dur=900;
  function tick(now){
    const p=Math.min((now-start)/dur,1);
    const ease=1-Math.pow(1-p,3);
    const val=Math.round(target*ease);
    el.innerHTML=val+(unit?`<span class="stat-unit">${unit}</span>`:'');
    if(p<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/* ── RENDER ── */
function filteredHistory(){
  if(curFilter==='all')return HISTORY;
  if(curFilter==='ok')return HISTORY.filter(h=>h.status==='ok');
  if(curFilter==='fail')return HISTORY.filter(h=>h.status==='fail');
  if(curFilter==='unrated')return HISTORY.filter(h=>h.stars===0);
}

function starsHTML(n,total=5){
  let s='';
  for(let i=1;i<=total;i++){
    s+=`<span class="star ${i<=n?'lit':'dim'}">⭐</span>`;
  }
  return s;
}

function formatDate(d){
  const parts=d.split('-');
  return `${parts[1]}月${parts[2]}日`;
}

function renderList(){
  const list=filteredHistory();
  const el=document.getElementById('logList');

  if(!list.length){
    el.innerHTML=`
      <div class="empty">
        <span class="empty-icon">🔭</span>
        <div class="empty-title">还没有记录</div>
        <div class="empty-sub">快去打印你的第一个模型吧！</div>
        <a href="library.html" class="btn-go">去模型库 →</a>
      </div>`;
    return;
  }

  el.innerHTML=list.map((h,i)=>`
    <div class="mcard ${h.status}" style="animation-delay:${i*0.06}s">
      <div class="mcard-strip ${h.status}"></div>
      <div class="mcard-thumb">${h.emoji}</div>
      <div class="mcard-body">
        <div class="mcard-top">
          <div class="mcard-name">${h.name}</div>
          <div class="mcard-status ${h.status}">${h.status==='ok'?'成功':'失败'}</div>
        </div>
        <div class="mcard-meta">
          <div class="meta-item">
            <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><polyline points="8,4 8,8 11,10"/></svg>
            ${h.duration}分钟
          </div>
          <div class="meta-item">
            <svg viewBox="0 0 16 16"><path d="M8 2C5 2 3 5 3 8s2 6 5 6 5-3 5-6-2-6-5-6z"/></svg>
            ${h.weight}g
          </div>
          <div class="meta-item">
            <svg viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="2" y1="6" x2="14" y2="6"/></svg>
            ${formatDate(h.date)}
          </div>
        </div>
        <div class="mcard-rating">
          <span class="rating-label">评价：</span>
          <div class="stars">${h.stars>0?starsHTML(h.stars):'<span style="font-size:12px;color:var(--dim)">还未评价</span>'}</div>
        </div>
        <div class="mcard-actions">
          <button class="mact primary" onclick="location.href='print.html'">🔄 再打印</button>
          ${h.stars===0&&h.status==='ok'?`<button class="mact" onclick="openRateModal('${h.id}','${h.emoji}')">⭐ 评价</button>`:''}
          <button class="mact" onclick="shareCard('${h.name}')">📤 分享</button>
        </div>
        <div class="mission-id">任务编号 ${h.id} · ${h.material}</div>
      </div>
    </div>
  `).join('');
}

/* ── FILTER ── */
function setFilter(f,btn){
  curFilter=f;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

/* ── RATE MODAL ── */
function openRateModal(id,emoji){
  ratingTarget=id;
  selectedStar=0;
  document.getElementById('rateEmoji').textContent=emoji;
  document.querySelectorAll('.rate-star').forEach(s=>s.classList.remove('sel'));
  document.getElementById('rateModal').classList.add('open');
}
function closeModal(e){
  if(e.target===document.getElementById('rateModal'))
    document.getElementById('rateModal').classList.remove('open');
}
function pickStar(n){
  selectedStar=n;
  document.querySelectorAll('.rate-star').forEach((s,i)=>{
    s.classList.toggle('sel',i<n);
  });
}
function submitRating(){
  if(!selectedStar){
    document.getElementById('rateStars').style.animation='shake .3s ease';
    setTimeout(()=>document.getElementById('rateStars').style.animation='',400);
    return;
  }
  const h=HISTORY.find(h=>h.id===ratingTarget);
  if(h){h.stars=selectedStar;}
  document.getElementById('rateModal').classList.remove('open');
  renderList();
}

/* ── SHARE ── */
function shareCard(name){
  if(navigator.share){
    navigator.share({title:`我打印了 ${name}！`,text:`我在 FORGE3D 成功打印了一个 ${name}，太酷了！`,url:location.href})
      .catch(()=>{});
  } else {
    const msg=document.createElement('div');
    msg.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);padding:10px 20px;background:rgba(0,200,255,.2);border:1px solid var(--neon);border-radius:100px;color:var(--neon);font-size:13px;z-index:999;pointer-events:none;';
    msg.textContent='链接已复制 ✓';
    document.body.appendChild(msg);
    setTimeout(()=>msg.remove(),2000);
  }
}

/* ── INIT ── */
computeStats();
renderList();
</script>
</body>
</html>
