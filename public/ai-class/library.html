<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模型库 · FORGE3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#030812;--card:rgba(8,20,42,0.88);
  --neon:#00C8FF;--orange:#FF6B1A;--green:#3BFF5A;--gold:#FFB800;--purple:#C060FF;
  --bright:#E8F8FF;--mid:#6B9AB5;--dim:#2E4F68;
  --border:rgba(0,200,255,0.14);--r:16px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--void);color:var(--bright);font-family:'Noto Sans SC',sans-serif;overflow-x:hidden;}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.gbg{position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:linear-gradient(rgba(0,200,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.018) 1px,transparent 1px);
  background-size:64px 64px;}
.scanline{position:fixed;left:0;right:0;top:-4px;height:4px;z-index:2;pointer-events:none;
  background:linear-gradient(transparent,rgba(0,200,255,0.05),transparent);animation:scan 8s linear infinite;}
@keyframes scan{to{top:100vh;}}

nav.top{position:fixed;inset:0 0 auto 0;z-index:100;height:64px;padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(3,8,18,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo svg{width:34px;height:34px;}
.logo-name{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,var(--neon),#00FFE5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
nav.top ul{display:flex;gap:28px;list-style:none;}
nav.top ul a{color:var(--mid);text-decoration:none;font-size:12px;font-weight:700;letter-spacing:1.5px;
  font-family:'Orbitron',sans-serif;transition:color .2s;}
nav.top ul a:hover,nav.top ul a.active{color:var(--neon);}

.wrap{position:relative;z-index:10;padding-top:64px;}

/* ── PAGE HEADER ── */
.page-head{padding:48px 48px 32px;text-align:center;}
.page-head h1{font-family:'Orbitron',sans-serif;font-size:clamp(28px,4vw,44px);font-weight:900;margin-bottom:12px;}
.page-head h1 em{font-style:normal;color:var(--neon);}
.page-head p{font-size:15px;color:var(--mid);margin-bottom:32px;}
.search-box{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:0;
  background:rgba(6,16,38,0.9);border:1.5px solid rgba(0,200,255,0.3);border-radius:var(--r);
  overflow:hidden;transition:border-color .2s,box-shadow .2s;}
.search-box:focus-within{border-color:var(--neon);box-shadow:0 0 24px rgba(0,200,255,0.15);}
.search-box input{flex:1;padding:16px 20px;background:transparent;border:none;outline:none;
  color:var(--bright);font-family:'Noto Sans SC',sans-serif;font-size:16px;}
.search-box input::placeholder{color:var(--dim);}
.search-box button{padding:16px 28px;background:var(--neon);border:none;
  color:#000;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;letter-spacing:1px;
  cursor:pointer;transition:background .2s;white-space:nowrap;}
.search-box button:hover{background:#00AAEE;}

/* ── CATEGORIES ── */
.section-label{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;
  color:var(--dim);text-transform:uppercase;margin-bottom:16px;padding:0 48px;}
.cats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;padding:0 48px 40px;max-width:960px;margin:0 auto;}
.cat-tile{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 8px;
  background:var(--card);border:1.5px solid var(--border);border-radius:12px;
  cursor:pointer;transition:all .22s;-webkit-tap-highlight-color:transparent;}
.cat-tile:hover,.cat-tile.active{border-color:var(--cc,var(--neon));background:rgba(0,200,255,0.06);
  transform:translateY(-2px);}
.cat-tile.active{box-shadow:0 6px 20px rgba(0,0,0,0.4);}
.cat-emoji{font-size:18px;line-height:1;}
.cat-name{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:.5px;
  color:var(--mid);text-align:center;}
.cat-tile.active .cat-name{color:var(--cc,var(--neon));}

/* ── MODEL GRID ── */
.grid-head{display:flex;align-items:center;justify-content:space-between;padding:0 48px;margin-bottom:20px;}
.grid-count{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--dim);letter-spacing:1px;}
.sort-sel{padding:8px 14px;background:rgba(6,16,38,0.8);border:1px solid var(--border);
  border-radius:8px;color:var(--mid);font-family:'Orbitron',sans-serif;font-size:11px;
  cursor:pointer;outline:none;letter-spacing:1px;}
.model-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:0 48px 120px;}

.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;cursor:pointer;transition:all .22s;position:relative;}
.mc:hover{transform:translateY(-4px);border-color:var(--neon);box-shadow:0 12px 36px rgba(0,0,0,0.5);}
.mc-thumb{height:160px;display:flex;align-items:center;justify-content:center;
  font-size:80px;background:rgba(0,200,255,0.04);position:relative;}
.mc-badges{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:5px;}
.badge{padding:3px 8px;border-radius:4px;font-family:'Orbitron',sans-serif;
  font-size:9px;font-weight:900;letter-spacing:1px;}
.badge.hot{background:rgba(255,107,26,0.9);color:#fff;}
.badge.new{background:rgba(59,255,90,0.85);color:#000;}
.mc-body{padding:14px 16px 16px;}
.mc-name{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--bright);margin-bottom:8px;}
.mc-meta{display:flex;gap:10px;flex-wrap:wrap;}
.mc-tag{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:4px;}
.mc-tag strong{color:var(--mid);}
.diff-dots{display:flex;gap:3px;}
.diff-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);}
.diff-dot.on{background:var(--neon);}

/* ── BOTTOM NAV ── */
nav.bnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;height:68px;
  background:rgba(3,8,18,0.96);backdrop-filter:blur(24px);border-top:1px solid rgba(0,200,255,0.12);
  padding:0 8px;justify-content:space-around;align-items:center;}
.bn{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;
  color:var(--dim);padding:6px 12px;transition:color .2s;-webkit-tap-highlight-color:transparent;flex:1;}
.bn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.bn span{font-size:10px;font-weight:700;font-family:'Orbitron',sans-serif;letter-spacing:.5px;}
.bn.active{color:var(--neon);}
.bn.active svg{filter:drop-shadow(0 0 5px var(--neon));}
.bn-fab{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--orange),#FF3300);
  display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(255,107,26,0.45);
  margin-top:-18px;border:3px solid rgba(3,8,18,0.9);text-decoration:none;flex-shrink:0;
  transition:transform .15s;-webkit-tap-highlight-color:transparent;}
.bn-fab:active{transform:scale(0.92);}
.bn-fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

@media(max-width:1280px){
  nav.top ul{display:none;}nav.top{padding:0 16px;}
  nav.bnav{display:flex;}
  .wrap{padding-bottom:0;}
  .page-head{padding:32px 16px 24px;}
  .section-label,.cats{padding-left:16px;padding-right:16px;}
  .cats{grid-template-columns:repeat(3,1fr);gap:10px;}
  .cat-tile{padding:16px 8px;}
  .cat-emoji{font-size:16px;}
  .grid-head,.model-grid{padding-left:16px;padding-right:16px;}
  .model-grid{grid-template-columns:repeat(2,1fr);padding-bottom:90px;}
  .mc-thumb{height:130px;font-size:64px;}
}
@media(max-width:480px){
  .cats{grid-template-columns:repeat(3,1fr);}
  .model-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
}
@media(hover:none){
  .cat-tile:active{border-color:var(--cc,var(--neon));transform:scale(0.97);}
  .mc:active{transform:translateY(-2px);border-color:var(--neon);}
}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="gbg"></div>
<div class="scanline"></div>

<nav class="top">
  <a href="index.html" class="logo">
    <svg viewBox="0 0 34 34" fill="none">
      <polygon points="17,2 32,10 32,24 17,32 2,24 2,10" stroke="url(#lg1)" stroke-width="1.5" fill="rgba(0,200,255,0.06)"/>
      <defs><linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00C8FF"/><stop offset="100%" stop-color="#00FFE5"/></linearGradient></defs>
    </svg>
    <span class="logo-name">FORGE3D</span>
  </a>
  <ul>
    <li><a href="index.html">首页</a></li>
    <li><a href="library.html" class="active">探索</a></li>
    <li><a href="learn.html">学习</a></li>
    <li><a href="ai-create.html">AI创作</a></li>
    <li><a href="profile.html">我的</a></li>
  </ul>
</nav>

<div class="wrap">
  <div class="page-head">
    <h1>🔭 <em>模型库</em></h1>
    <p>选择一个类别，找到你想打印的模型</p>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索模型名称..." autocomplete="off">
      <button onclick="doSearch()">搜索</button>
    </div>
  </div>

  <div class="section-label" style="padding:0 48px 0;">选择类别</div>
  <div class="cats" id="catGrid"></div>

  <div class="grid-head">
    <div class="grid-count" id="gridCount"></div>
    <select class="sort-sel" id="sortSel" onchange="renderGrid()">
      <option value="hot">热门优先</option>
      <option value="new">最新优先</option>
      <option value="fast">打印最快</option>
    </select>
  </div>
  <div class="model-grid" id="modelGrid"></div>
</div>

<nav class="bnav">
  <a href="index.html" class="bn">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>首页</span>
  </a>
  <a href="library.html" class="bn active">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>探索</span>
  </a>
  <a href="ai-create.html" class="bn-fab">
    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
  </a>
  <a href="learn.html" class="bn">
    <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
    <span>学习</span>
  </a>
  <a href="profile.html" class="bn">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>我的</span>
  </a>
</nav>

<script>
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const stars=Array.from({length:180},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.3+.3,a:Math.random(),s:Math.random()*.003+.001}));
  (function draw(){ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{s.a+=s.s;if(s.a>1){s.a=0;s.x=Math.random();s.y=Math.random();}
      ctx.globalAlpha=s.a*.7;ctx.fillStyle='#E8F8FF';
      ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;requestAnimationFrame(draw);})();
})();

const CATS=[
  {id:'all', name:'全部', emoji:'🌌', color:'var(--neon)'},
  {id:'动物', name:'动物', emoji:'🦕', color:'var(--gold)'},
  {id:'太空', name:'太空', emoji:'🚀', color:'var(--neon)'},
  {id:'科幻', name:'科幻', emoji:'🤖', color:'var(--purple)'},
  {id:'建筑', name:'建筑', emoji:'🏛️', color:'var(--orange)'},
  {id:'机械', name:'机械', emoji:'⚙️', color:'var(--green)'},
];

const MODELS=[
  {name:'霸王龙',cat:'动物',emoji:'🦖',time:120,diff:1,hot:true,new:false},
  {name:'太空火箭',cat:'太空',emoji:'🚀',time:180,diff:2,hot:true,new:true},
  {name:'机器人头盔',cat:'科幻',emoji:'🤖',time:240,diff:3,hot:false,new:false},
  {name:'埃菲尔铁塔',cat:'建筑',emoji:'🗼',time:360,diff:3,hot:true,new:false},
];

let curCat='all', searchQ='';

function buildCats(){
  const grid=document.getElementById('catGrid');
  grid.innerHTML=CATS.map(c=>`
    <div class="cat-tile${curCat===c.id?' active':''}" style="--cc:${c.color}"
      onclick="setCat('${c.id}')">
      <div class="cat-emoji">${c.emoji}</div>
      <div class="cat-name">${c.name}</div>
    </div>`).join('');
}
function setCat(id){curCat=id;buildCats();renderGrid();}
function doSearch(){searchQ=document.getElementById('searchInput').value.trim();renderGrid();}
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

function renderGrid(){
  let list=MODELS.filter(m=>(curCat==='all'||m.cat===curCat)&&
    (!searchQ||m.name.includes(searchQ)||m.cat.includes(searchQ)));
  const sort=document.getElementById('sortSel').value;
  if(sort==='hot') list=list.sort((a,b)=>b.hot-a.hot);
  else if(sort==='new') list=list.sort((a,b)=>b.new-a.new);
  else if(sort==='fast') list=list.sort((a,b)=>a.time-b.time);
  document.getElementById('gridCount').textContent=`共 ${list.length} 个模型`;
  document.getElementById('modelGrid').innerHTML=list.map(m=>`
    <div class="mc" onclick="location.href='model-detail.html?name='+encodeURIComponent('${m.name}')+'&emoji='+encodeURIComponent('${m.emoji}')">
      <div class="mc-thumb">
        ${m.emoji}
        <div class="mc-badges">
          ${m.hot?'<span class="badge hot">热门</span>':''}
          ${m.new?'<span class="badge new">最新</span>':''}
        </div>
      </div>
      <div class="mc-body">
        <div class="mc-name">${m.name}</div>
        <div class="mc-meta">
          <div class="mc-tag">
            <div class="diff-dots">
              ${[1,2,3].map(i=>`<div class="diff-dot${i<=m.diff?' on':''}"></div>`).join('')}
            </div>
            <strong>${['','简单','中等','较难'][m.diff]}</strong>
          </div>
          <div class="mc-tag">⏱ <strong>${m.time}分钟</strong></div>
        </div>
      </div>
    </div>`).join('');
}

buildCats();renderGrid();
</script>
</body>
</html>
