<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习路径 · FORGE3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#030812;--neon:#00C8FF;--orange:#FF6B1A;--green:#3BFF5A;--gold:#FFB800;
  --bright:#E8F8FF;--mid:#6B9AB5;--dim:#2E4F68;--border:rgba(0,200,255,0.14);--r:16px;
  --nav:64px;--bar:52px;--btnbar:76px;--bnav:68px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

/* ── FULL-SCREEN LAYOUT ── */
html,body{height:100%;overflow:hidden;}
body{background:#030812;color:var(--bright);font-family:'Noto Sans SC',sans-serif;
  display:flex;flex-direction:column;}

/* bg stays fixed */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.gbg{position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:linear-gradient(rgba(0,200,255,0.018) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,200,255,0.018) 1px,transparent 1px);
  background-size:64px 64px;}

/* ── TOP NAV ── */
nav.top{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav);padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(3,8,18,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo svg{width:32px;height:32px;}
.logo-name{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,var(--neon),#00FFE5);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
nav.top ul{display:flex;gap:24px;list-style:none;}
nav.top ul a{color:var(--mid);text-decoration:none;font-size:12px;font-weight:700;
  letter-spacing:1.5px;font-family:'Orbitron',sans-serif;transition:color .2s;}
nav.top ul a:hover,nav.top ul a.active{color:var(--neon);}

/* ── COURSE BAR ── */
.course-bar{position:fixed;top:var(--nav);left:0;right:0;z-index:90;height:var(--bar);
  padding:0 40px;display:flex;align-items:center;justify-content:space-between;gap:16px;
  background:rgba(4,12,28,0.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.cb-left{display:flex;align-items:center;gap:14px;min-width:0;}
.cb-back{display:flex;align-items:center;gap:5px;color:var(--dim);text-decoration:none;
  font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;
  transition:color .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.cb-back:hover{color:var(--neon);}
.cb-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;}
.cb-sep{width:1px;height:18px;background:var(--border);flex-shrink:0;}
.cb-lesson{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;
  color:var(--bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cb-right{display:flex;align-items:center;gap:14px;flex-shrink:0;}
.step-dots{display:flex;gap:7px;align-items:center;}
.sdot{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--dim);
  background:transparent;transition:all .25s;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.sdot.done{background:var(--green);border-color:var(--green);}
.sdot.active{background:var(--neon);border-color:var(--neon);
  box-shadow:0 0 8px rgba(0,200,255,.6);}
.step-label{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;
  color:var(--mid);letter-spacing:1px;white-space:nowrap;}

/* ── CONTENT AREA (fills between bars) ── */
.content-spacer{height:calc(var(--nav) + var(--bar));flex-shrink:0;}
.lesson-area{flex:1;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 24px;position:relative;z-index:10;}

/* ── LESSON CONTENT ── */
.lesson-inner{width:100%;max-width:620px;display:flex;flex-direction:column;
  align-items:center;text-align:center;gap:0;}
.lesson-icon{font-size:80px;line-height:1;margin-bottom:24px;
  animation:iconIn .4s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes iconIn{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.lesson-step-tag{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:2.5px;color:var(--neon);text-transform:uppercase;margin-bottom:14px;
  animation:fadeUp .4s .05s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.lesson-title{font-family:'Orbitron',sans-serif;font-size:clamp(20px,3.5vw,32px);
  font-weight:900;color:var(--bright);line-height:1.25;margin-bottom:22px;
  animation:fadeUp .4s .1s ease both;}
.lesson-body{font-size:clamp(15px,2vw,18px);color:var(--mid);line-height:1.85;
  margin-bottom:28px;animation:fadeUp .4s .15s ease both;}
.lesson-tip{display:flex;align-items:flex-start;gap:12px;
  padding:16px 20px;border-radius:var(--r);text-align:left;
  background:rgba(0,200,255,0.05);border:1px solid rgba(0,200,255,0.12);
  animation:fadeUp .4s .2s ease both;}
.tip-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.tip-text{font-size:14px;color:var(--dim);line-height:1.7;}
.tip-text strong{color:var(--mid);}

/* ── BOTTOM BUTTON BAR ── */
.btn-bar{position:fixed;bottom:0;left:0;right:0;z-index:90;height:var(--btnbar);
  padding:0 24px;display:flex;align-items:center;gap:12px;
  background:rgba(3,8,18,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);}
.btn-step{display:flex;align-items:center;justify-content:center;gap:8px;
  height:48px;border-radius:var(--r);font-family:'Orbitron',sans-serif;
  font-size:13px;font-weight:900;letter-spacing:1px;cursor:pointer;
  transition:all .2s;border:none;-webkit-tap-highlight-color:transparent;}
.btn-prev{flex:0 0 auto;padding:0 24px;background:rgba(0,200,255,0.07);
  border:1.5px solid var(--border);color:var(--mid);}
.btn-prev:hover:not(:disabled){border-color:var(--neon);color:var(--neon);}
.btn-prev:disabled{opacity:.25;cursor:not-allowed;}
.btn-next{flex:1;background:linear-gradient(135deg,var(--orange),#FF3300);color:#fff;
  box-shadow:0 4px 24px rgba(255,107,26,.35);}
.btn-next:hover{box-shadow:0 8px 32px rgba(255,107,26,.5);transform:translateY(-1px);}
.btn-next:active{transform:scale(0.98);}

/* ── COMPLETE OVERLAY ── */
canvas#confetti{position:fixed;inset:0;z-index:299;pointer-events:none;}
.complete-overlay{display:none;position:fixed;inset:0;z-index:300;
  background:rgba(3,8,18,0.94);backdrop-filter:blur(16px);
  align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px;}
.complete-overlay.show{display:flex;}
.co-emoji{font-size:88px;margin-bottom:20px;
  animation:pop .5s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}
.co-title{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:var(--green);margin-bottom:8px;}
.co-sub{font-size:15px;color:var(--mid);margin-bottom:8px;}
.co-xp{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--gold);margin-bottom:36px;}
.btn-co-next{padding:18px 48px;background:linear-gradient(135deg,var(--neon),#0088CC);
  border:none;border-radius:var(--r);color:#000;font-family:'Orbitron',sans-serif;
  font-size:15px;font-weight:900;letter-spacing:1px;cursor:pointer;margin-bottom:12px;
  transition:all .2s;}
.btn-co-next:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,200,255,.4);}
.btn-co-back{padding:12px 28px;background:transparent;border:1.5px solid var(--border);
  border-radius:var(--r);color:var(--mid);font-family:'Orbitron',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.btn-co-back:hover{border-color:var(--neon);color:var(--neon);}

/* ── BOTTOM NAV ── */
nav.bnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;height:var(--bnav);
  background:rgba(3,8,18,0.97);backdrop-filter:blur(24px);border-top:1px solid rgba(0,200,255,0.12);
  padding:0 8px;justify-content:space-around;align-items:center;}
.bn{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;
  color:var(--dim);padding:6px 12px;transition:color .2s;
  -webkit-tap-highlight-color:transparent;flex:1;}
.bn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round;}
.bn span{font-size:10px;font-weight:700;font-family:'Orbitron',sans-serif;letter-spacing:.5px;}
.bn.active{color:var(--neon);}
.bn.active svg{filter:drop-shadow(0 0 5px var(--neon));}
.bn-fab{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--orange),#FF3300);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(255,107,26,.45);margin-top:-18px;
  border:3px solid rgba(3,8,18,.9);text-decoration:none;flex-shrink:0;
  transition:transform .15s;-webkit-tap-highlight-color:transparent;}
.bn-fab:active{transform:scale(.92);}
.bn-fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── TABLET ── */
@media(max-width:1280px){
  nav.top ul{display:none;}
  nav.top{padding:0 16px;}
  nav.bnav{display:flex;}
  /* btn bar sits above bottom nav */
  .btn-bar{bottom:var(--bnav);}
  /* lesson area: give bottom room for btn-bar + bnav */
  .lesson-area{padding:20px 16px;}
  .cb-lesson{font-size:11px;max-width:150px;}
  .course-bar{padding:0 16px;}
  .lesson-icon{font-size:60px;margin-bottom:16px;}
  .lesson-title{font-size:clamp(18px,4vw,26px);}
  .lesson-body{font-size:15px;}
}
@media(hover:none){
  .sdot:active{transform:scale(1.3);}
  .btn-next:active{transform:scale(.97);}
  .btn-prev:active:not(:disabled){border-color:var(--neon);color:var(--neon);}
}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="gbg"></div>
<canvas id="confetti"></canvas>

<!-- COMPLETE OVERLAY -->
<div class="complete-overlay" id="completeOverlay">
  <div class="co-emoji">🎉</div>
  <div class="co-title">太棒了！</div>
  <div class="co-sub">你完成了「认识3D坐标系」</div>
  <div class="co-xp">⚡ +150 经验值</div>
  <button class="btn-co-next" onclick="nextLesson()">继续下一课 →</button>
  <button class="btn-co-back" onclick="closeOverlay()">回到地图</button>
</div>

<!-- TOP NAV -->
<nav class="top">
  <a href="index.html" class="logo">
    <svg viewBox="0 0 34 34" fill="none">
      <polygon points="17,2 32,10 32,24 17,32 2,24 2,10" stroke="url(#lg3)" stroke-width="1.5" fill="rgba(0,200,255,0.06)"/>
      <defs><linearGradient id="lg3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00C8FF"/><stop offset="100%" stop-color="#00FFE5"/></linearGradient></defs>
    </svg>
    <span class="logo-name">FORGE3D</span>
  </a>
  <ul>
    <li><a href="index.html">首页</a></li>
    <li><a href="library.html">探索</a></li>
    <li><a href="learn.html" class="active">学习</a></li>
    <li><a href="ai-create.html">AI创作</a></li>
    <li><a href="profile.html">我的</a></li>
  </ul>
</nav>

<!-- COURSE BAR -->
<div class="course-bar">
  <div class="cb-left">
    <a href="index.html" class="cb-back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>返回
    </a>
    <div class="cb-sep"></div>
    <div class="cb-lesson" id="cbLesson">认识 3D 坐标系</div>
  </div>
  <div class="cb-right">
    <div class="step-dots" id="stepDots"></div>
    <div class="step-label" id="stepLabel"></div>

</div>

<!-- SPACER (pushes content below fixed bars) -->
<div class="content-spacer"></div>

<!-- LESSON CONTENT AREA -->
<div class="lesson-area" id="lessonArea">
  <div class="lesson-inner" id="lessonInner"></div>
</div>

<!-- BUTTON BAR -->
<div class="btn-bar">
  <button class="btn-step btn-prev" id="btnPrev" onclick="changeStep(-1)">← 上一步</button>
  <button class="btn-step btn-next" id="btnNext" onclick="changeStep(1)">下一步 →</button>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <a href="index.html" class="bn">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>首页</span>
  </a>
  <a href="library.html" class="bn">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>探索</span>
  </a>
  <a href="ai-create.html" class="bn-fab">
    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
  </a>
  <a href="learn.html" class="bn active">
    <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
    <span>学习</span>
  </a>
  <a href="profile.html" class="bn">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>我的</span>
  </a>
</nav>

<script>
/* Starfield */
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const stars=Array.from({length:160},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.3+.3,a:Math.random(),s:Math.random()*.003+.001}));
  (function draw(){ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{s.a+=s.s;if(s.a>1){s.a=0;s.x=Math.random();s.y=Math.random();}
      ctx.globalAlpha=s.a*.65;ctx.fillStyle='#E8F8FF';
      ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;requestAnimationFrame(draw);})();
})();

const STEPS=[
  {icon:'📐',title:'什么是 3D 坐标系？',
   body:'3D 坐标系是描述空间中位置的方法。就像地图用经纬度定位，3D 空间用 X、Y、Z 三个方向描述任何一个点的位置。',
   tip:'小知识：X 轴是左右，Y 轴是前后，Z 轴是上下。三个轴互相垂直！'},
  {icon:'↔️',title:'X 轴 — 左右方向',
   body:'X 轴控制模型的左右位置。向右移动时 X 值增大，向左移动时 X 值减小。正方向是向右。',
   tip:'小练习：想象你向右走 3 步，你的 X 坐标就是 3！'},
  {icon:'↕️',title:'Y 轴 — 上下方向',
   body:'Y 轴控制模型的高度。打印机从下往上一层层堆积材料，Y 值越大，模型越高。',
   tip:'类比：一栋楼的楼层就是 Y 值——一楼 Y=0，二楼 Y=3，三楼 Y=6…'},
  {icon:'🔄',title:'Z 轴 — 前后深度',
   body:'Z 轴控制模型的前后深度，让物体有了「立体感」，不再是平面图形。',
   tip:'看看周围：你眼前任何物体都能用 X、Y、Z 精确描述它在空间中的位置！'},
  {icon:'🎯',title:'综合运用坐标',
   body:'把三个轴结合起来，就能在 3D 空间精确定位任意一点。例如坐标 (2, 5, 3) 代表：右移 2，上移 5，前移 3。',
   tip:'✅ 你已经掌握了 3D 坐标系的基础知识，可以进入下一课了！'},
];

let cur=0;

function renderDots(){
  document.getElementById('stepDots').innerHTML=
    STEPS.map((_,i)=>`<div class="sdot ${i<cur?'done':i===cur?'active':''}" onclick="goStep(${i})"></div>`).join('');
  document.getElementById('stepLabel').textContent=`${cur+1} / ${STEPS.length}`;
}

function renderLesson(){
  const s=STEPS[cur];
  const el=document.getElementById('lessonInner');
  /* force re-animation */
  el.style.display='none';
  requestAnimationFrame(()=>{
    el.style.display='';
    el.innerHTML=`
      <div class="lesson-icon">${s.icon}</div>
      <div class="lesson-step-tag">第 ${cur+1} 步 · 共 ${STEPS.length} 步</div>
      <div class="lesson-title">${s.title}</div>
      <div class="lesson-body">${s.body}</div>
      <div class="lesson-tip">
        <div class="tip-icon">💡</div>
        <div class="tip-text">${s.tip}</div>
      </div>`;
  });
  document.getElementById('btnPrev').disabled=(cur===0);
  const isLast=(cur===STEPS.length-1);
  document.getElementById('btnNext').textContent=isLast?'完成本课 🎉':'下一步 →';
  renderDots();
  /* scroll lesson area back to top on each step change */
  document.getElementById('lessonArea').scrollTop=0;
}

function goStep(i){cur=i;renderLesson();}

function changeStep(dir){
  if(dir===1&&cur===STEPS.length-1){showComplete();return;}
  cur=Math.max(0,Math.min(STEPS.length-1,cur+dir));
  renderLesson();
}

function showComplete(){
  document.getElementById('completeOverlay').classList.add('show');
  launchConfetti();
}
function closeOverlay(){document.getElementById('completeOverlay').classList.remove('show');}
function nextLesson(){closeOverlay();cur=0;renderLesson();}

function launchConfetti(){
  const cv=document.getElementById('confetti');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');
  const cols=['#00C8FF','#3BFF5A','#FFB800','#FF6B1A','#C060FF','#00FFE5'];
  const pts=Array.from({length:90},()=>({
    x:Math.random()*cv.width,y:-10,
    vx:(Math.random()-.5)*5,vy:Math.random()*4+2,
    w:Math.random()*10+4,h:Math.random()*5+2,
    rot:Math.random()*360,rv:(Math.random()-.5)*7,
    col:cols[Math.floor(Math.random()*cols.length)],a:1
  }));
  let f=0;
  (function anim(){
    ctx.clearRect(0,0,cv.width,cv.height);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.a=Math.max(0,1-f/80);
      ctx.save();ctx.globalAlpha=p.a;ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.col;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
    });
    if(++f<90) requestAnimationFrame(anim);
    else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

renderLesson();
</script>
</body>
