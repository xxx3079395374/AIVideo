<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欢迎 · FORGE3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#030812;--card:rgba(8,20,42,0.92);
  --neon:#00C8FF;--orange:#FF6B1A;--green:#3BFF5A;--gold:#FFB800;
  --bright:#E8F8FF;--mid:#6B9AB5;--dim:#2E4F68;
  --border:rgba(0,200,255,0.14);--r:20px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--void);color:var(--bright);font-family:'Noto Sans SC',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* ── BACKGROUND ── */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.gbg{position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:linear-gradient(rgba(0,200,255,0.018) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,200,255,0.018) 1px,transparent 1px);
  background-size:64px 64px;}
.scanline{position:fixed;left:0;right:0;top:-4px;height:4px;z-index:2;pointer-events:none;
  background:linear-gradient(transparent,rgba(0,200,255,0.05),transparent);
  animation:scan 8s linear infinite;}
@keyframes scan{to{top:100vh;}}

/* Ambient glow blobs */
.blob{position:fixed;border-radius:50%;filter:blur(80px);z-index:1;pointer-events:none;}
.blob1{width:400px;height:400px;background:rgba(0,80,200,0.18);top:-100px;left:-80px;
  animation:driftA 12s ease-in-out infinite;}
.blob2{width:320px;height:320px;background:rgba(255,107,26,0.1);bottom:-80px;right:-60px;
  animation:driftB 15s ease-in-out infinite;}
@keyframes driftA{0%,100%{transform:translate(0,0);}50%{transform:translate(40px,30px);}}
@keyframes driftB{0%,100%{transform:translate(0,0);}50%{transform:translate(-30px,-20px);}}

/* ── CARD ── */
.login-card{
  position:relative;z-index:10;
  width:min(440px,calc(100vw - 32px));
  background:var(--card);border:1px solid var(--border);border-radius:28px;
  padding:48px 36px 40px;
  box-shadow:0 32px 80px rgba(0,0,0,.6),0 0 60px rgba(0,200,255,.05);
  animation:riseIn .6s cubic-bezier(.22,1,.36,1) both;
}
@keyframes riseIn{from{opacity:0;transform:translateY(40px) scale(.96);}to{opacity:1;transform:none;}}

/* ── LOGO ── */
.logo-area{text-align:center;margin-bottom:36px;}
.logo-cube{display:inline-flex;align-items:center;justify-content:center;
  width:80px;height:80px;border-radius:20px;margin-bottom:16px;
  background:linear-gradient(135deg,#0050CC,#003399);
  box-shadow:0 0 0 1px rgba(0,200,255,.3),0 0 40px rgba(0,200,255,.25),
             inset 0 1px 0 rgba(255,255,255,.1);
  font-size:42px;
  animation:logoPulse 3s ease-in-out infinite;}
@keyframes logoPulse{
  0%,100%{box-shadow:0 0 0 1px rgba(0,200,255,.3),0 0 30px rgba(0,200,255,.2);}
  50%{box-shadow:0 0 0 1px rgba(0,200,255,.5),0 0 50px rgba(0,200,255,.4),0 0 80px rgba(0,200,255,.1);}}
.brand{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;letter-spacing:4px;
  background:linear-gradient(135deg,var(--neon) 0%,#00FFE5 50%,var(--neon) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:200% auto;animation:shimmer 3s linear infinite;}
@keyframes shimmer{to{background-position:200% center;}}
.brand-sub{font-size:13px;color:var(--mid);margin-top:6px;letter-spacing:1px;}

/* ── TABS ── */
.auth-tabs{display:flex;gap:2px;background:rgba(0,200,255,.06);border-radius:12px;
  padding:3px;margin-bottom:28px;}
.auth-tab{flex:1;padding:10px;border-radius:10px;border:none;background:transparent;
  color:var(--mid);font-family:'Noto Sans SC',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .25s;}
.auth-tab.active{background:rgba(0,200,255,.15);color:var(--neon);}

/* ── AVATAR SELECT ── */
.av-select{margin-bottom:20px;}
.av-select-lbl{font-size:12px;color:var(--mid);margin-bottom:10px;letter-spacing:.5px;}
.av-grid{display:flex;gap:10px;flex-wrap:wrap;}
.av-chip{width:44px;height:44px;border-radius:50%;border:2px solid var(--dim);
  background:rgba(0,200,255,.04);display:flex;align-items:center;justify-content:center;
  font-size:24px;cursor:pointer;transition:all .2s;}
.av-chip:hover{border-color:var(--neon);transform:scale(1.1);}
.av-chip.sel{border-color:var(--neon);background:rgba(0,200,255,.18);
  box-shadow:0 0 12px rgba(0,200,255,.35);}

/* ── INPUT ── */
.field{margin-bottom:14px;}
.field-lbl{font-size:12px;color:var(--mid);margin-bottom:7px;display:block;letter-spacing:.5px;}
.field-input{width:100%;background:rgba(0,200,255,.05);border:1px solid var(--border);
  border-radius:12px;padding:13px 16px;color:var(--bright);
  font-family:'Noto Sans SC',sans-serif;font-size:16px;outline:none;
  transition:border-color .2s,box-shadow .2s;}
.field-input:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(0,200,255,.12);}
.field-input::placeholder{color:var(--dim);}

/* ── BUTTONS ── */
.btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,var(--orange),#FF3D00);
  border:none;border-radius:100px;color:#fff;font-family:'Noto Sans SC',sans-serif;
  font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;
  box-shadow:0 4px 20px rgba(255,107,26,.35);
  transition:all .2s;}
.btn-primary:hover{filter:brightness(1.12);transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(255,107,26,.45);}
.btn-primary:active{transform:none;}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--dim);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.btn-guest{width:100%;padding:14px;background:rgba(0,200,255,.08);
  border:1px solid var(--border);border-radius:100px;color:var(--neon);
  font-family:'Noto Sans SC',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .2s;}
.btn-guest:hover{background:rgba(0,200,255,.16);border-color:var(--neon);}

/* ── ACCOUNT TAB ── */
.forgot{text-align:right;margin-top:-6px;margin-bottom:10px;}
.forgot a{font-size:12px;color:var(--mid);text-decoration:none;transition:color .2s;}
.forgot a:hover{color:var(--neon);}

/* ── FOOTER NOTE ── */
.login-footer{margin-top:24px;text-align:center;font-size:12px;color:var(--dim);line-height:1.7;}

/* ── WELCOME OVERLAY ── */
.welcome-ov{position:fixed;inset:0;z-index:500;background:var(--void);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .4s;}
.welcome-ov.show{opacity:1;pointer-events:all;}
.welcome-emoji{font-size:80px;animation:bounce .6s ease infinite alternate;}
@keyframes bounce{to{transform:translateY(-12px);}}
.welcome-txt{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;
  color:var(--neon);margin-top:24px;letter-spacing:3px;text-align:center;}
.welcome-sub{font-size:15px;color:var(--mid);margin-top:10px;}

@media(max-width:480px){
  .login-card{padding:36px 24px 32px;}
  .brand{font-size:22px;}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="gbg"></div>
<div class="scanline"></div>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<!-- WELCOME OVERLAY -->
<div class="welcome-ov" id="welcomeOv">
  <div class="welcome-emoji" id="welcomeEmoji">🚀</div>
  <div class="welcome-txt" id="welcomeTxt">欢迎回来！</div>
  <div class="welcome-sub" id="welcomeSub">正在进入 FORGE3D…</div>
</div>

<!-- LOGIN CARD -->
<div class="login-card">

  <!-- LOGO -->
  <div class="logo-area">
    <div class="logo-cube">🖨️</div>
    <div class="brand">FORGE3D</div>
    <div class="brand-sub">3D打印创客学习平台</div>
  </div>

  <!-- TABS -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-register" onclick="showTab('register')">新同学 👋</button>
    <button class="auth-tab" id="tab-login" onclick="showTab('login')">老同学 🚀</button>
  </div>

  <!-- REGISTER PANEL -->
  <div id="panel-register">
    <!-- Avatar pick -->
    <div class="av-select">
      <div class="av-select-lbl">选一个头像 ✨</div>
      <div class="av-grid">
        <div class="av-chip sel" onclick="pickAv(this,'🚀')">🚀</div>
        <div class="av-chip" onclick="pickAv(this,'🤖')">🤖</div>
        <div class="av-chip" onclick="pickAv(this,'🦊')">🦊</div>
        <div class="av-chip" onclick="pickAv(this,'🐉')">🐉</div>
        <div class="av-chip" onclick="pickAv(this,'🦄')">🦄</div>
        <div class="av-chip" onclick="pickAv(this,'🐼')">🐼</div>
        <div class="av-chip" onclick="pickAv(this,'🦁')">🦁</div>
        <div class="av-chip" onclick="pickAv(this,'⭐')">⭐</div>
      </div>
    </div>

    <div class="field">
      <label class="field-lbl">你的名字</label>
      <input class="field-input" id="reg-name" type="text" placeholder="输入你的名字，最多8个字" maxlength="8">
    </div>
    <div class="field">
      <label class="field-lbl">班级（选填）</label>
      <input class="field-input" id="reg-class" type="text" placeholder="例如：三年二班">
    </div>

    <button class="btn-primary" onclick="doRegister()">🚀 开始探索！</button>

    <div class="divider">或者</div>
    <button class="btn-guest" onclick="doGuest()">👻 游客体验（不保存进度）</button>
  </div>

  <!-- LOGIN PANEL -->
  <div id="panel-login" style="display:none">
    <div class="field">
      <label class="field-lbl">你的名字</label>
      <input class="field-input" id="login-name" type="text" placeholder="输入你的名字">
    </div>
    <div class="field">
      <label class="field-lbl">密码</label>
      <input class="field-input" id="login-pass" type="password" placeholder="••••••">
    </div>
    <div class="forgot"><a href="#">忘记密码？找老师帮忙</a></div>

    <button class="btn-primary" onclick="doLogin()">🔑 进入 FORGE3D</button>

    <div class="divider">或者</div>
    <button class="btn-guest" onclick="doGuest()">👻 游客体验</button>
  </div>

  <div class="login-footer">
    欢迎来到 3D 打印课堂 🎉<br>
    如遇问题请找老师
  </div>

</div>

<script>
/* ── STARFIELD ── */
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  let W,H,pts=[];
  function init(){
    W=c.width=window.innerWidth;H=c.height=window.innerHeight;
    pts=Array.from({length:150},()=>({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*1+.3,o:Math.random()*.8+.1,sp:Math.random()*1.5+.5
    }));
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.o+=Math.sin(Date.now()/900*p.sp)*0.008;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,220,255,${Math.max(0.05,Math.min(0.9,p.o))})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',init);init();draw();
})();

/* ── TAB SWITCH ── */
function showTab(tab){
  ['register','login'].forEach(t=>{
    document.getElementById('panel-'+t).style.display=t===tab?'block':'none';
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
}

/* ── AVATAR ── */
let curEmoji='🚀';
function pickAv(el,emoji){
  curEmoji=emoji;
  document.querySelectorAll('.av-chip').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
}

/* ── REGISTER ── */
function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  if(!name){
    const inp=document.getElementById('reg-name');
    inp.style.borderColor='rgba(255,64,96,.6)';
    inp.placeholder='请输入你的名字哦！';
    setTimeout(()=>{inp.style.borderColor='';inp.placeholder='输入你的名字，最多8个字';},2000);
    return;
  }
  showWelcome(curEmoji,'🎉 你好，'+name+'！','正在创建你的星际档案…');
}

/* ── LOGIN ── */
function doLogin(){
  const name=document.getElementById('login-name').value.trim();
  if(!name){
    document.getElementById('login-name').style.borderColor='rgba(255,64,96,.6)';
    setTimeout(()=>document.getElementById('login-name').style.borderColor='',2000);
    return;
  }
  showWelcome('🚀','欢迎回来，'+name+'！','正在加载你的数据…');
}

/* ── GUEST ── */
function doGuest(){
  showWelcome('👻','游客体验','进入体验模式，数据不会保存…');
}

/* ── WELCOME ANIM ── */
function showWelcome(emoji,title,sub){
  const ov=document.getElementById('welcomeOv');
  document.getElementById('welcomeEmoji').textContent=emoji;
  document.getElementById('welcomeTxt').textContent=title;
  document.getElementById('welcomeSub').textContent=sub;
  ov.classList.add('show');
  setTimeout(()=>{location.href='index.html';},1800);
}
</script>
</body>
</html>
